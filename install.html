<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安装今日助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0f172a;color:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:40px;max-width:400px;width:100%;text-align:center}
.icon{width:80px;height:80px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:20px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:#fff}
h1{font-size:24px;margin-bottom:8px}
p{color:#94a3b8;font-size:14px;margin-bottom:24px}
.steps{text-align:left;margin:24px 0}
.step{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start}
.step-num{width:28px;height:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.step-text{font-size:14px;color:#e2e8f0;line-height:1.5}
.step-text strong{color:#f8fafc}
.btn{display:inline-block;padding:14px 32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.note{margin-top:20px;padding:12px;background:rgba(255,255,255,.05);border-radius:8px;font-size:12px;color:#94a3b8}
</style>
</head>
<body>
<div class="card">
  <div class="icon">T</div>
  <h1>今日助手</h1>
  <p>Your Daily Companion</p>
  <a class="btn" href="index.html">打开应用</a>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">点击上方按钮打开应用</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">点击浏览器菜单 <strong>⋮</strong></div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">选择 <strong>"添加到主屏幕"</strong> 或 <strong>"安装应用"</strong></div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-text">确认安装，即可在桌面找到应用图标</div>
    </div>
  </div>
  <div class="note">💡 小米手机：打开后点击地址栏的"安装"按钮，或菜单中选择"添加到桌面"</div>
</div>
</body>
</html>

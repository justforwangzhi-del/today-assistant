<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="今日助手">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>今日助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6366f1;--secondary:#ec4899;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--text:#f8fafc;--text-muted:#94a3b8;--card:rgba(255,255,255,.08);--border:rgba(255,255,255,.1);--radius:16px;--radius-sm:10px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px)}
html,body{margin:0;padding:0;width:100%;min-height:100vh;min-height:100dvh;overflow-x:hidden;background:#0f172a}
html{scroll-behavior:smooth;overscroll-behavior-y:contain}
body{font-family:-apple-system,sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent;padding-bottom:env(safe-area-inset-bottom,0px)}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);z-index:-2}
body::after{content:'';position:fixed;bottom:0;left:0;right:0;height:env(safe-area-inset-bottom,4px);background:#0f172a;z-index:10000;pointer-events:none}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;animation:orbFloat 20s ease-in-out infinite}
.bg-orb:nth-child(1){width:400px;height:400px;background:#6366f1;top:-150px;left:-150px}
.bg-orb:nth-child(2){width:350px;height:350px;background:#ec4899;bottom:-100px;right:-100px;animation-delay:-7s}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
.container{max-width:100%;position:relative;z-index:1;padding:12px 12px 20px 12px}

/* Weather Effects */
.weather-fx{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden;transition:background 2s}
/* Rain */
.rain-drop{position:absolute;width:2px;background:linear-gradient(transparent,rgba(150,200,255,.6));animation:rainFall linear infinite}
@keyframes rainFall{0%{transform:translateY(-20px)}100%{transform:translateY(100vh)}}
/* Snow */
.snowflake{position:absolute;color:rgba(255,255,255,.8);animation:snowFall linear infinite;pointer-events:none}
@keyframes snowFall{0%{transform:translateY(-20px) rotate(0deg)}100%{transform:translateY(100vh) rotate(360deg)}}
/* Lightning */
.lightning{position:fixed;inset:0;background:rgba(255,255,255,.15);opacity:0;pointer-events:none;z-index:-1;transition:opacity .05s}
/* Sun glow */
.sun-glow{position:fixed;top:-100px;right:-100px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,200,50,.25),transparent 70%);animation:sunPulse 4s ease-in-out infinite;pointer-events:none;z-index:-1}
@keyframes sunPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.1);opacity:.9}}
/* Stars */
.star{position:fixed;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite;pointer-events:none;z-index:-1}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
/* Mist */
.mist{position:fixed;inset:0;background:linear-gradient(180deg,transparent,rgba(180,200,220,.15) 50%,transparent);animation:mistDrift 10s ease-in-out infinite alternate;pointer-events:none;z-index:-1}
@keyframes mistDrift{0%{transform:translateX(-3%)}100%{transform:translateX(3%)}}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0 12px}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#f8fafc,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-time{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#f8fafc,#cbd5e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-date{font-size:11px;color:var(--text-muted);text-align:right}

/* Countdown */
.countdown{background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(6,182,212,.15));border:1px solid rgba(16,185,129,.3);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.countdown.weekend{background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(236,72,153,.15));border-color:rgba(139,92,246,.3)}
.countdown-label{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px}
.countdown-time{font-size:36px;font-weight:800;letter-spacing:-1px;overflow:visible;min-height:44px;line-height:1.2}
.cd-digit{display:inline-block;animation:digitDrop .8s cubic-bezier(.34,1.56,.64,1) both}
@keyframes digitDrop{
  0%{transform:translateY(-50px) scale(1.3);opacity:0;filter:blur(6px)}
  60%{transform:translateY(4px) scale(.97);opacity:1;filter:blur(0)}
  80%{transform:translateY(-2px) scale(1.02)}
  100%{transform:translateY(0) scale(1);opacity:1;filter:blur(0)}
}
.countdown-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.countdown-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:10px;overflow:hidden}
.countdown-fill{height:100%;background:linear-gradient(90deg,#10b981,#06b6d4);border-radius:2px;transition:width 1s linear}

/* Glass Card */
.card{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.badge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;color:#fff}
.card-link{font-size:11px;color:var(--text-muted);text-decoration:none}
.stats{display:flex;gap:8px;font-size:10px;color:var(--text-muted)}
.stats strong{color:#e2e8f0}

/* Weather */
.weather-row{display:flex;align-items:center;gap:12px}
.weather-icon{font-size:42px}
.weather-temp{font-size:36px;font-weight:800;line-height:1}
.weather-temp span{font-size:16px;font-weight:400;opacity:.6}
.weather-desc{font-size:14px;font-weight:600}
.weather-detail{font-size:11px;color:rgba(255,255,255,.5)}
.weather-loc{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

/* Match */
.match{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);padding:10px;margin-bottom:6px}
.match-league{font-size:9px;color:var(--text-muted);font-weight:700;letter-spacing:.5px;margin-bottom:6px}
.match-teams{display:flex;align-items:center;justify-content:space-between}
.team{display:flex;align-items:center;gap:6px}
.team.r{flex-direction:row-reverse}
.team-logo{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;border:1px solid rgba(255,255,255,.1)}
.team-name{font-size:11px;font-weight:600}
.match-vs{font-size:9px;font-weight:800;color:var(--text-muted)}
.match-time{text-align:center;margin-top:6px}
.match-time span{font-size:10px;font-weight:600;color:#818cf8;background:rgba(99,102,241,.15);padding:2px 8px;border-radius:8px}
.match-status{font-size:9px;color:var(--success);font-weight:600;margin-top:4px}
.match-status.live{color:var(--danger);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Input Group */
.input-group{display:flex;gap:6px;margin-bottom:8px}
.input{flex:1;padding:8px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);font-size:12px;color:var(--text);outline:none}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(99,102,241,.2)}
.input::placeholder{color:var(--text-muted)}
.btn{padding:8px 12px;background:linear-gradient(135deg,var(--primary),#4f46e5);color:#fff;border:none;border-radius:var(--radius-sm);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn.pink{background:linear-gradient(135deg,#8b5cf6,#6366f1)}
.btn:hover{transform:translateY(-1px)}

/* Priority */
.pri-group{display:flex;gap:2px}
.pri{width:24px;height:24px;border:1px solid rgba(255,255,255,.1);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;background:transparent}
.pri.active{border-color:var(--primary);background:rgba(99,102,241,.2)}

/* Filters */
.filters{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.filter{padding:3px 8px;border:1px solid rgba(255,255,255,.08);border-radius:10px;font-size:9px;cursor:pointer;background:transparent;color:var(--text-muted)}
.filter.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* List */
.list{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.item{display:flex;align-items:center;gap:6px;padding:7px 8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm)}
.check{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check.done{background:var(--success);border-color:var(--success)}
.check.done::after{content:'✓';color:#fff;font-size:9px;font-weight:700}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.dot.high{background:var(--danger);box-shadow:0 0 4px var(--danger)}
.dot.medium{background:var(--warning)}
.dot.low{background:var(--success)}
.item-content{flex:1;min-width:0}
.item-text{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item.completed .item-text{text-decoration:line-through;color:var(--text-muted)}
.item-time{font-size:8px;color:var(--text-muted)}
.del{width:18px;height:18px;border:none;background:none;color:var(--text-muted);cursor:pointer;font-size:11px;flex-shrink:0}
.del:hover{color:var(--danger)}
.empty{text-align:center;padding:20px;color:var(--text-muted);font-size:11px}

/* Progress Bar */
.p-track{position:relative;height:20px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
.p-fill{position:absolute;height:100%;width:0;min-width:0;background:linear-gradient(90deg,#6366f1,#ec4899);border-radius:10px;transition:width 3s cubic-bezier(.25,.1,.25,1);box-shadow:0 0 10px rgba(99,102,241,.3)}
.p-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:pShimmer 2s infinite}
@keyframes pShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.p-pct{position:absolute;height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:8px;font-weight:700;color:#fff;text-shadow:0 0 4px rgba(0,0,0,.5);transition:all 3s cubic-bezier(.25,.1,.25,1)}

/* Wall */
.wall-post{padding:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);margin-bottom:6px;position:relative;border-left:3px solid}
.wall-post:nth-child(3n+1){border-left-color:#6366f1}
.wall-post:nth-child(3n+2){border-left-color:#ec4899}
.wall-post:nth-child(3n){border-left-color:#06b6d4}
.wall-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.wall-user{display:flex;align-items:center;gap:5px}
.wall-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.wall-name{font-size:9px;font-weight:600;color:var(--text-muted)}
.wall-time{font-size:8px;color:var(--text-muted)}
.wall-content{font-size:11px;line-height:1.4}
.wall-action{display:inline-flex;align-items:center;gap:2px;font-size:10px;color:var(--text-muted);cursor:pointer;background:none;border:none;padding:0;margin-top:4px}
.wall-action.liked{color:var(--danger)}
.emoji-bar{display:flex;gap:3px;margin-bottom:8px}
.emoji-btn{width:26px;height:26px;border:1px solid rgba(255,255,255,.08);border-radius:5px;background:rgba(255,255,255,.03);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}

/* Music Player */
.music-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.music-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:transform .2s}
.music-btn:active{transform:scale(.9)}
.music-btn.play{background:linear-gradient(135deg,var(--primary),#4f46e5);color:#fff}
.music-btn.ctrl{background:rgba(255,255,255,.08);color:var(--text-muted)}
.music-info{flex:1;min-width:0}
.music-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-artist{font-size:9px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-progress{height:3px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;position:relative}
.music-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:2px;width:0%;transition:width .3s}
.music-vol{display:flex;align-items:center;gap:4px}
.music-vol input[type=range]{width:60px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.15);border-radius:2px;outline:none}
.music-vol input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.music-list{max-height:140px;overflow-y:auto}
.music-list::-webkit-scrollbar{width:2px}
.music-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:1px}
.music-track{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .2s}
.music-track:hover{background:rgba(255,255,255,.05)}
.music-track.active{background:rgba(99,102,241,.15)}
.music-track-icon{font-size:16px;flex-shrink:0}
.music-track-info{flex:1;min-width:0}
.music-track-name{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-track-desc{font-size:8px;color:var(--text-muted)}
.music-visualizer{display:flex;align-items:flex-end;gap:2px;height:16px;margin-left:auto;flex-shrink:0}
.music-visualizer span{width:3px;background:var(--primary);border-radius:1px;animation:visualizerPulse .8s ease-in-out infinite alternate}
.music-visualizer span:nth-child(2){animation-delay:.2s}
.music-visualizer span:nth-child(3){animation-delay:.4s}
.music-visualizer span:nth-child(4){animation-delay:.1s}
@keyframes visualizerPulse{0%{height:3px}100%{height:14px}}

/* Sync Status */
.sync-status{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:6px 14px;border-radius:20px;font-size:11px;z-index:100;opacity:0;transition:opacity .3s}
.sync-status.show{opacity:1}

/* Footer */
.footer{text-align:center;padding:16px 0;font-size:9px;color:var(--text-muted)}

/* Animations */
.fade{opacity:0;transform:translateY(12px);animation:fadeUp .4s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="bg-orbs"><div class="bg-orb"></div><div class="bg-orb"></div></div>
<div class="weather-fx" id="weather-fx"></div>
<div class="lightning" id="lightning"></div>
<div class="sync-status" id="sync-status">✓ 已同步</div>
<div style="position:fixed;bottom:0;left:0;right:0;height:1px;background:#0f172a;z-index:9999;pointer-events:none"></div>

<div class="container">
  <div class="header fade">
    <div><h1>Today</h1></div>
    <div><div class="header-time" id="clock">00:00</div><div class="header-date" id="date"></div></div>
  </div>

  <div class="countdown fade" style="animation-delay:.05s" id="countdown">
    <div class="countdown-label" id="cd-label">⏰ 下班倒计时</div>
    <div class="countdown-time" id="cd-time">00:00:00</div>
    <div class="countdown-sub" id="cd-sub">加载中...</div>
    <div class="countdown-bar"><div class="countdown-fill" id="cd-bar" style="width:0%"></div></div>
  </div>

  <div class="card fade" style="animation-delay:.08s" id="progress-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700">📅 今日进度</div>
      <div style="font-size:10px;color:var(--text-muted)" id="p-time"></div>
    </div>
    <div class="p-track">
      <div class="p-fill" id="p-fill"></div>
      <div class="p-pct" id="p-pct"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:8px;color:var(--text-muted)">
      <span>🌅 6:00</span>
      <span>☀️ 12:00</span>
      <span>🌇 18:00</span>
      <span>🌙 24:00</span>
    </div>
    <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap" id="p-segments"></div>
  </div>

  <div class="card fade" style="animation-delay:.1s">
    <div class="weather-row">
      <div class="weather-icon" id="w-icon">🌤️</div>
      <div><div class="weather-temp" id="w-temp">--<span>°C</span></div></div>
      <div style="flex:1"><div class="weather-desc" id="w-desc">加载中...</div><div class="weather-detail" id="w-detail"></div><div class="weather-loc" id="w-loc">📍 定位中...</div></div>
    </div>
    <div id="w-tip" style="margin-top:8px;padding:6px 10px;background:rgba(255,200,50,.08);border:1px solid rgba(255,200,50,.15);border-radius:8px;font-size:10px;color:#fbbf24;line-height:1.5">
      <div id="w-tip-text"></div>
      <div style="margin-top:4px;text-align:right">
        <button onclick="speakTip()" style="background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.2);color:#fbbf24;padding:3px 8px;border-radius:6px;font-size:9px;cursor:pointer">🔊 语音播报</button>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card fade" style="animation-delay:.15s">
      <div class="card-header">
        <div class="card-title">🏆 电竞赛事</div>
        <a class="card-link" href="https://lpl.qq.com" target="_blank">更多 →</a>
      </div>
      <div id="match-list"></div>
    </div>

    <div class="card fade" style="animation-delay:.2s">
      <div class="card-header">
        <div class="card-title">📝 每日待办</div>
        <div class="stats"><span>📋 <strong id="t-total">0</strong></span><span>✅ <strong id="t-done">0</strong></span></div>
      </div>
      <div class="input-group">
        <input type="text" class="input" id="todo-input" placeholder="添加待办..." maxlength="100">
        <div class="pri-group">
          <button class="pri" data-p="low" onclick="setPri('low')">🟢</button>
          <button class="pri active" data-p="medium" onclick="setPri('medium')">🟡</button>
          <button class="pri" data-p="high" onclick="setPri('high')">🔴</button>
        </div>
        <button class="btn" onclick="addTodo()">+</button>
      </div>
      <div class="filters">
        <button class="filter active" onclick="filterTodo('all',this)">全部</button>
        <button class="filter" onclick="filterTodo('pending',this)">待办</button>
        <button class="filter" onclick="filterTodo('done',this)">完成</button>
      </div>
      <div class="list" id="todo-list"></div>
    </div>
  </div>

  <div class="card fade" style="animation-delay:.22s;border-left:3px solid #f59e0b">
    <div class="card-header">
      <div class="card-title">😂 每日一笑</div>
      <button class="card-link" onclick="nextJoke()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px">换一个 →</button>
    </div>
    <div id="joke-content" style="font-size:13px;line-height:1.6;color:#e2e8f0;min-height:40px"></div>
  </div>

  <div class="card fade" style="animation-delay:.23s">
    <div class="card-header">
      <div class="card-title">🎵 音乐</div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px">🔈</span>
        <input type="range" min="0" max="100" value="35" style="width:50px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.15);border-radius:2px" oninput="setVol(this.value)">

document.addEventListener('DOMContentLoaded',()=>{

// ===== Config =====
const GITHUB_TOKEN_KEY='gh_token';
const GIST_ID_KEY='gh_gist_id';

// ===== IndexedDB =====
let db=null;
async function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('TodayApp',1);
    r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('data'))e.target.result.createObjectStore('data')};
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=e=>rej(e);
  });
}
async function dbPut(k,v){if(!db)await openDB();return new Promise((res,rej)=>{const t=db.transaction('data','readwrite');t.objectStore('data').put(v,k);t.oncomplete=res;t.onerror=rej})}
async function dbGet(k){if(!db)await openDB();return new Promise((res,rej)=>{const t=db.transaction('data','readonly');const r=t.objectStore('data').get(k);r.onsuccess=()=>res(r.result);r.onerror=rej})}

// ===== Cloud Sync =====
let token=localStorage.getItem(GITHUB_TOKEN_KEY)||'';
let gistId=localStorage.getItem(GIST_ID_KEY)||'';

// Check URL hash for token: #ghp_xxxx
(function(){
  const h=location.hash.slice(1);
  if(h&&h.startsWith('ghp_')){token=h;localStorage.setItem(GITHUB_TOKEN_KEY,h)}
})();
function setHashToken(t){if(t){history.replaceState(null,'','#'+t)}else{history.replaceState(null,'',location.pathname+location.search)}}

async function ensureToken(){
  if(token)return true;
  if(localStorage.getItem(SKIP_TOKEN_KEY))return false;
  return new Promise(resolve=>{
    const m=document.createElement('div');
    m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    m.innerHTML=`<div style="background:#1e293b;border-radius:16px;padding:20px;max-width:340px;width:100%;border:1px solid rgba(255,255,255,.1)">
      <h3 style="color:#f8fafc;font-size:15px;margin-bottom:6px">🔐 启用云同步</h3>
      <p style="color:#94a3b8;font-size:11px;margin-bottom:12px">输入GitHub Token以云端保存数据<br><a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank" style="color:#818cf8">点此生成Token</a></p>
      <input type="text" id="tk-input" placeholder="ghp_xxxx" style="width:100%;padding:8px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#f8fafc;font-size:12px;margin-bottom:10px">
      <div style="display:flex;gap:6px">
        <button id="tk-ok" style="flex:1;padding:8px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer">确认</button>
        <button id="tk-skip" style="flex:1;padding:8px;background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:12px;cursor:pointer">跳过</button>
      </div>
    </div>`;
    document.body.appendChild(m);
    document.getElementById('tk-ok').onclick=async()=>{
      const v=document.getElementById('tk-input').value.trim();
      const btn=document.getElementById('tk-ok');
      if(!v||!v.startsWith('ghp_')){document.getElementById('tk-input').style.borderColor='#ef4444';return}
      btn.textContent='验证中...';btn.disabled=true;
      try{
        const r=await fetch('https://api.github.com/user',{headers:{'Authorization':`token ${v}`}});
        if(!r.ok)throw new Error('验证失败');
        token=v;localStorage.setItem(GITHUB_TOKEN_KEY,v);setHashToken(v);m.remove();resolve(true);
      }catch(e){
        document.getElementById('tk-input').style.borderColor='#ef4444';
        document.getElementById('tk-input').placeholder='Token无效，请重新输入';
        btn.textContent='确认';btn.disabled=false;
      }
    };
    document.getElementById('tk-skip').onclick=()=>{localStorage.setItem(SKIP_TOKEN_KEY,'1');m.remove();resolve(false)};
    document.getElementById('tk-input').onkeypress=e=>{if(e.key==='Enter')document.getElementById('tk-ok').click()};
  });
}

async function cloudSync(key,data){
  if(!token)return;
  try{
    // Find or create gist
    if(!gistId){
      const r=await fetch('https://api.github.com/gists?per_page=100',{headers:{'Authorization':`token ${token}`}});
      if(r.ok){
        const gists=await r.json();
        const found=gists.find(g=>g.description==='TodayAssistant'&&g.files&&g.files['data.json']);
        if(found)gistId=found.id;
      }
    }
    
    const allData={todos:JSON.stringify(todos),wallPosts:JSON.stringify(wallPosts)};
    if(!gistId){
      const r=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({description:'TodayAssistant',files:{'data.json':{content:JSON.stringify(allData)}}})});
      if(!r.ok)throw new Error('创建Gist失败: '+r.status);
      const g=await r.json();
      if(!g.id)throw new Error('无效的Gist响应');
      gistId=g.id;localStorage.setItem(GIST_ID_KEY,gistId);
    }else{
      const r1=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{'Authorization':`token ${token}`}});
      if(!r1.ok)throw new Error('读取Gist失败: '+r1.status);
      const g1=await r1.json();
      let ex={};
      if(g1.files&&g1.files['data.json']){
        try{ex=JSON.parse(g1.files['data.json'].content)}catch(e){}
      }
      ex[key]=JSON.stringify(data);
      const r2=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({files:{'data.json':{content:JSON.stringify(ex)}}})});
      if(!r2.ok)throw new Error('更新Gist失败: '+r2.status);
    }
    showSync('✓ 已同步到云端');
  }catch(e){
    console.error('Sync error:',e);
    showSync('⚠️ 云同步失败，数据已本地保存');
  }
}

async function cloudLoad(key){
  if(!token)return null;
  if(!gistId){
    // Try to find existing gist
    try{
      const r=await fetch('https://api.github.com/gists?per_page=100',{headers:{'Authorization':`token ${token}`}});
      if(r.ok){
        const gists=await r.json();
        const found=gists.find(g=>g.description==='TodayAssistant'&&g.files&&g.files['data.json']);
        if(found){gistId=found.id;localStorage.setItem(GIST_ID_KEY,gistId)}
      }
    }catch(e){}
  }
  if(!gistId)return null;
  try{
    const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{'Authorization':`token ${token}`}});
    const g=await r.json();
    if(g.files&&g.files['data.json']){const d=JSON.parse(g.files['data.json'].content);return d[key]?JSON.parse(d[key]):null}
    return null;
  }catch(e){return null}
}

function showSync(msg){
  const s=document.getElementById('sync-status');s.textContent=msg;s.classList.add('show');
  setTimeout(()=>s.classList.remove('show'),2000);
}

async function resetToken(){
  if(token){
    if(confirm('当前已启用云同步，是否要重新设置Token？')){
      token='';gistId='';localStorage.removeItem(GITHUB_TOKEN_KEY);localStorage.removeItem(GIST_ID_KEY);localStorage.removeItem(SKIP_TOKEN_KEY);setHashToken('');
      showSync('已清除Token设置');updateCopyBtn();
    }
  }else{
    localStorage.removeItem(SKIP_TOKEN_KEY);
    await ensureToken();
    if(token){
      setHashToken(token);
      // Try to find and load existing cloud data
      try{
        const ct=await cloudLoad('todos');if(ct&&ct.length)todos=ct;
        const cp=await cloudLoad('wallPosts');if(cp&&cp.length)wallPosts=cp;
        renderTodos();renderWall();
      }catch(e){console.error('Load cloud data failed:',e)}
      // Then sync current data
      try{
        await cloudSync('todos',todos);
        await cloudSync('wallPosts',wallPosts);
      }catch(e){console.error('Initial sync failed:',e)}
      showSync('✓ 云同步已启用');updateCopyBtn();
    }
  }
}

let _cdAnimated=false;
function updateCountdown(){
  const n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds(),day=n.getDay();
  const cd=document.getElementById('countdown'),label=document.getElementById('cd-label');
  const timeEl=document.getElementById('cd-time');
  const prevText=timeEl.textContent;
  
  if(day===0||day===6){
    cd.className='countdown weekend';
    const seed=(n.getFullYear()*365+n.getMonth()*31+n.getDate())%weekendMsgs.length;
    const msg=weekendMsgs[seed];
    label.textContent=`${msg.icon} ${msg.text}`;
    const newText='🎉 周末愉快';
    if(!_cdAnimated){animateText(timeEl,newText);_cdAnimated=true}else if(prevText!==newText)timeEl.textContent=newText;
    document.getElementById('cd-sub').textContent=msg.sub;
    document.getElementById('cd-bar').style.width='100%';
    document.getElementById('cd-bar').style.background='linear-gradient(90deg,#8b5cf6,#ec4899)';
    return;
  }
  
  cd.className='countdown';
  label.textContent='⏰ 下班倒计时';
  document.getElementById('cd-bar').style.background='linear-gradient(90deg,#10b981,#06b6d4)';
  
  const cur=h*60+m,start=9*60,end=18*60;
  let newText='';
  if(cur<start){
    const d=start-cur;newText=`0${Math.floor(d/60)}:${String(d%60).padStart(2,'0')}:00`;
    document.getElementById('cd-sub').textContent='距离上班还有';document.getElementById('cd-bar').style.width='0%';
  }else if(cur>=end){
    newText='🎉 下班啦！';
    document.getElementById('cd-sub').textContent='辛苦了，好好休息~';document.getElementById('cd-bar').style.width='100%';
  }else{
    const rem=end-cur,rh=Math.floor(rem/60),rm=rem%60,rs=60-s;
    newText=`${String(rh).padStart(2,'0')}:${String(rm).padStart(2,'0')}:${String(rs).padStart(2,'0')}`;
    document.getElementById('cd-sub').textContent=`今日已工作 ${Math.floor((cur-start)/60)}小时${(cur-start)%60}分钟`;
    document.getElementById('cd-bar').style.width=Math.min(100,Math.max(0,((cur-start)/(end-start))*100))+'%';
  }
  
  if(!_cdAnimated){animateText(timeEl,newText);_cdAnimated=true}else if(prevText!==newText)timeEl.textContent=newText;
}

function animateText(el,text){
  el.innerHTML=[...text].map((ch,i)=>
    ch===' '?`<span style="display:inline-block;width:8px"></span>`:`<span class="cd-digit" style="animation-delay:${i*100}ms">${ch}</span>`
  ).join('');
}

function updateProgress(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();

  const pct=Math.min(100,(totalMin/1440)*100);
  const pctStr=Math.floor(pct)+'%';
  
  document.getElementById('p-time').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} · 已过${pctStr}`;

  }
}

// ===== Ambient Sound Engine =====
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function stopAmbient(){curNodes.forEach(n=>{try{n.stop&&n.stop();n.disconnect&&n.disconnect()}catch(e){}});curNodes=[]}

function createNoise(ctx,type){
  const len=ctx.sampleRate*2;const buf=ctx.createBuffer(1,len,ctx.sampleRate);const data=buf.getChannelData(0);
  if(type==='pink'){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;b3=.8665*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;data[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;b6=w*.115926}}
  else if(type==='brown'){let last=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;data[i]=(last+.02*w)/1.02;last=data[i];data[i]*=3.5}}
  else{for(let i=0;i<len;i++)data[i]=Math.random()*2-1}
  return buf;
}

function playAmbientSound(type){
  stopAmbient();const ctx=getCtx();curNodes=[];
  const gain=ctx.createGain();gain.connect(ctx.destination);gain.gain.value=.35;curNodes.push(gain);
  const P=(t,fopts)=>{const n=ctx.createBufferSource();n.buffer=createNoise(ctx,'pink');n.loop=true;const f=ctx.createBiquadFilter();f.type=t;Object.assign(f,fopts);return[n,f]};
  if(type==='rain'){const[n,f]=P('bandpass',{frequency:800,Q:.5});const g=ctx.createGain();g.gain.value=.6;n.connect(f);f.connect(g);g.connect(gain);n.start();curNodes.push(n,f,g)}
  else if(type==='ocean'){const n=ctx.createBufferSource();n.buffer=createNoise(ctx,'brown');n.loop=true;const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=400;const lfo=ctx.createOscillator();lfo.frequency.value=.1;const lg=ctx.createGain();lg.gain.value=300;lfo.connect(lg);lg.connect(f.frequency);lfo.start();n.connect(f);f.connect(gain);n.start();curNodes.push(n,f,lfo,lg)}
  else if(type==='fire'){const n=ctx.createBufferSource();n.buffer=createNoise(ctx,'brown');n.loop=true;const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=600;f.Q.value=1.5;const g=ctx.createGain();g.gain.value=.4;n.connect(f);f.connect(g);g.connect(gain);n.start();curNodes.push(n,f,g)}
  else if(type==='wind'){const[n,f]=P('lowpass',{frequency:300});const lfo=ctx.createOscillator();lfo.frequency.value=.07;const lg=ctx.createGain();lg.gain.value=200;lfo.connect(lg);lg.connect(f.frequency);lfo.start();n.connect(f);f.connect(gain);n.start();curNodes.push(n,f,lfo,lg)}
  else if(type==='forest'){const[n,f]=P('bandpass',{frequency:2000,Q:3});const g=ctx.createGain();g.gain.value=.1;n.connect(f);f.connect(g);g.connect(gain);n.start();curNodes.push(n,f,g)}
  else if(type==='night'){const n=ctx.createBufferSource();n.buffer=createNoise(ctx,'brown');n.loop=true;const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=4000;f.Q.value=8;const g=ctx.createGain();g.gain.value=.08;n.connect(f);f.connect(g);g.connect(gain);n.start();curNodes.push(n,f,g)}
}

function playAmbient(i){

let currentWeather='clear';
async function fetchWeather(){
  try{
    const r=await fetch('https://wttr.in/?format=j1');
    const d=await r.json(),c=d.current_condition[0],code=parseInt(c.weatherCode);
    let icon='☁️';
    if(code>=200&&code<300)icon='⛈️';else if(code>=300&&code<600)icon='🌧️';
    else if(code>=600&&code<700)icon='❄️';else if(code>=700&&code<800)icon='🌫️';
    else if(code===800)icon='☀️';else if(code===801)icon='⛅';
    document.getElementById('w-icon').textContent=icon;
    document.getElementById('w-temp').innerHTML=`${c.temp_C}<span>°C</span>`;
    document.getElementById('w-desc').textContent=c.lang_zh?.[0]?.value||c.weatherDesc[0].value;
    document.getElementById('w-detail').textContent=`体感${c.FeelsLikeC}°C · 湿度${c.humidity}%`;
    document.getElementById('w-loc').textContent=`📍 ${d.nearest_area[0].areaName[0].value}`;
    
    let wtype='clear';
    if(code>=200&&code<300)wtype='thunder';
    else if(code>=300&&code<600)wtype='rain';
    else if(code>=600&&code<700)wtype='snow';
    else if(code>=700&&code<800)wtype='mist';
    else if(code===800)wtype='sunny';
    else wtype='cloudy';
    
    const h=new Date().getHours();
    if(h>=18&&h<20)wtype='sunset';
    else if(h>=20||h<6)wtype='night';
    
    if(wtype!==currentWeather){currentWeather=wtype;applyWeatherFx(wtype)}
    
    const tips=getWeatherTip(code,parseInt(c.temp_C),parseInt(c.FeelsLikeC),parseInt(c.humidity),h);
    document.getElementById('w-tip-text').innerHTML=tips.display;
    window._tipSpeakText=tips.speak;
  }catch(e){applyWeatherFx('clear')}
}

function getWeatherTip(code,temp, feels, hum, hour){
  const tips=[];
  
  // Temperature tips
  if(temp>=35)tips.push('🥵 高温预警！尽量避免户外活动，多喝水防中暑');
  else if(temp>=30)tips.push('☀️ 天气炎热，注意防晒补水');
  else if(temp>=25)tips.push('😊 温度舒适，适合户外活动');
  else if(temp>=15)tips.push('🍂 微凉天气，适合散步');
  else if(temp>=5)tips.push('🧣 天气较冷，注意添衣保暖');
  else if(temp>=0)tips.push('❄️ 寒冷天气，出门记得穿厚外套');
  else tips.push('🥶 严寒天气，尽量减少外出，注意防冻');
  
  // Weather type tips
  if(code>=200&&code<300)tips.push('⛈️ 雷暴天气，远离空旷地带，注意安全');
  else if(code>=300&&code<500)tips.push('🌧️ 小雨绵绵，记得带伞出门');
  else if(code>=500&&code<600)tips.push('🌂 大雨来袭，出行注意安全，小心路滑');
  else if(code>=600&&code<700)tips.push('⛄ 下雪天路滑，出门注意防滑');
  else if(code>=700&&code<800)tips.push('🌫️ 能见度低，开车注意减速慢行');
  else if(code===800)tips.push('😎 阳光明媚，适合晒太阳补钙');
  
  // Humidity tips
  if(hum>=80)tips.push('💧 湿度较高，衣服不容易干');
  else if(hum<=30)tips.push('🏜️ 空气干燥，记得多喝水、涂保湿');
  
  // Time-based tips
  const meals=['早餐','午餐','晚餐'];
  if(hour>=6&&hour<9)tips.push(`🌅 早安！记得吃${meals[0]}哦`);
  else if(hour>=11&&hour<13)tips.push(`🍱 午饭时间到，好好犒劳自己`);
  else if(hour>=17&&hour<19)tips.push(`🌇 下班啦，回家吃${meals[2]}~`);
  else if(hour>=22||hour<6)tips.push('🌙 夜深了，早点休息，晚安');
  
  return{display:tips.join('<br>')||'✨ 今天也是美好的一天！',speak:tips.map(t=>t.replace(/[^\u4e00-\u9fa5a-zA-Z0-9，。！？、]/g,'')).join('，')};
}

function speakTip(){
  const text=window._tipSpeakText;
  if(!text)return;
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';u.rate=0.9;u.pitch=1;
    const btn=document.querySelector('#w-tip button');
    u.onstart=()=>{btn.textContent='🔊 播放中...'};
    u.onend=()=>{btn.textContent='🔊 语音播报'};
    u.onerror=()=>{btn.textContent='⚠️ 播放失败';setTimeout(()=>{btn.textContent='🔊 语音播报'},2000)};
    window.speechSynthesis.speak(u);
    // Chrome bug: resume after a short delay
    setTimeout(()=>{if(window.speechSynthesis.paused)window.speechSynthesis.resume()},100);
  }else{
    const btn=document.querySelector('#w-tip button');
    btn.textContent='⚠️ 浏览器不支持';
    setTimeout(()=>{btn.textContent='🔊 语音播报'},2000);
  }
}

function applyWeatherFx(type){
  const fx=document.getElementById('weather-fx');
  const body=document.body;
  fx.innerHTML='';
  const bodyBg=body.style;
  
  switch(type){
    case'rain':
      bodyBg.background='linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)';
      for(let i=0;i<80;i++){const d=document.createElement('div');d.className='rain-drop';d.style.left=Math.random()*100+'%';d.style.height=(15+Math.random()*20)+'px';d.style.animationDuration=(.4+Math.random()*.3)+'s';d.style.animationDelay=Math.random()*2+'s';d.style.opacity=.3+Math.random()*.4;fx.appendChild(d)}
      break;
    case'thunder':
      bodyBg.background='linear-gradient(135deg,#0d1117,#1a1a2e,#16213e)';
      for(let i=0;i<100;i++){const d=document.createElement('div');d.className='rain-drop';d.style.left=Math.random()*100+'%';d.style.height=(20+Math.random()*25)+'px';d.style.animationDuration=(.3+Math.random()*.3)+'s';d.style.animationDelay=Math.random()*2+'s';d.style.opacity=.4+Math.random()*.5;fx.appendChild(d)}
      setInterval(()=>{if(Math.random()<.3){const l=document.getElementById('lightning');l.style.opacity='1';setTimeout(()=>l.style.opacity='0',80);setTimeout(()=>{l.style.opacity='.6';setTimeout(()=>l.style.opacity='0',60)},150)}},3000);
      break;
    case'snow':
      bodyBg.background='linear-gradient(135deg,#2c3e50,#34495e,#2c3e50)';
      for(let i=0;i<50;i++){const s=document.createElement('div');s.className='snowflake';s.textContent=['❄','❅','❆','•'][Math.floor(Math.random()*4)];s.style.left=Math.random()*100+'%';s.style.fontSize=(8+Math.random()*14)+'px';s.style.animationDuration=(4+Math.random()*6)+'s';s.style.animationDelay=Math.random()*5+'s';fx.appendChild(s)}
      break;
    case'sunny':
      bodyBg.background='linear-gradient(135deg,#1e3a5f,#2d5a8e,#1e3a5f)';
      const sg=document.createElement('div');sg.className='sun-glow';fx.appendChild(sg);
      break;
    case'sunset':
      bodyBg.background='linear-gradient(180deg,#1a1a2e 0%,#e74c3c 40%,#f39c12 70%,#f1c40f 100%)';
      const sg2=document.createElement('div');sg2.className='sun-glow';sg2.style.cssText='top:auto;bottom:-50px;right:10%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,100,50,.35),transparent 70%)';fx.appendChild(sg2);
      break;
    case'night':
      bodyBg.background='linear-gradient(135deg,#0a0a1a,#0d1b2a,#0a0a1a)';
      for(let i=0;i<40;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*60+'%';s.style.width=s.style.height=(1+Math.random()*2)+'px';s.style.animationDuration=(1.5+Math.random()*2)+'s';s.style.animationDelay=Math.random()*3+'s';fx.appendChild(s)}
      break;
    case'mist':
      bodyBg.background='linear-gradient(135deg,#2c3e50,#34495e,#4a6741)';
      for(let i=0;i<3;i++){const m=document.createElement('div');m.className='mist';m.style.animationDelay=i*3+'s';m.style.opacity=.3+Math.random()*.3;fx.appendChild(m)}
      break;
    case'cloudy':default:
      bodyBg.background='linear-gradient(135deg,#1e293b,#2d3a4e,#1e293b)';
      break;
  }
  document.querySelectorAll('.bg-orb').forEach(o=>o.style.opacity=type==='night'?'.15':'.3');
}

function getMyId(){if(!myId){myId=localStorage.getItem('myId');if(!myId){myId=adjs[Math.floor(Math.random()*adjs.length)]+nouns[Math.floor(Math.random()*nouns.length)]+Math.floor(Math.random()*999+1);localStorage.setItem('myId',myId)}}return myId}
function getColor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return pcolors[Math.abs(h)%pcolors.length]}
function getEmoji(){return emojis[Math.floor(Math.random()*emojis.length)]}
function timeAgo(ts){const d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return'刚刚';if(m<60)return m+'分钟前';const h=Math.floor(m/60);if(h<24)return h+'小时前';return Math.floor(h/24)+'天前'}

function postWall(){
  const inp=document.getElementById('wall-input'),text=inp.value.trim();
  if(!text)return;
  wallPosts.unshift({id:Date.now(),userId:getMyId(),text,emoji:getEmoji(),color:getColor(getMyId()),likes:0,likedBy:[],time:Date.now()});
  saveWall();renderWall();inp.value='';
}

function likeWall(id){
  const p=wallPosts.find(x=>x.id===id);if(!p)return;
  const mid=getMyId();
  if(p.likedBy.includes(mid)){p.likedBy=p.likedBy.filter(i=>i!==mid);p.likes--}
  else{p.likedBy.push(mid);p.likes++}
  saveWall();renderWall();
}

function renderWall(){
  const list=document.getElementById('wall-list'),mid=getMyId();
  if(!wallPosts.length){list.innerHTML='<div class="empty">💬 还没有吐槽，来第一条吧！</div>';return}
  list.innerHTML=wallPosts.slice(0,20).map(p=>{
    const isMe=p.userId===mid,isLiked=p.likedBy.includes(mid);
    return`<div class="wall-post" style="border-left-color:${p.color}"><div class="wall-header"><div class="wall-user"><div class="wall-avatar" style="background:${p.color}">${p.emoji}</div><span class="wall-name">${p.userId}${isMe?' (我)':''}</span></div><span class="wall-time">${timeAgo(p.time)}</span></div><div class="wall-content">${p.text}</div><button class="wall-action ${isLiked?'liked':''}" onclick="likeWall(${p.id})">${isLiked?'❤️':'🤍'} ${p.likes}</button></div>`;
  }).join('');
  document.getElementById('w-total').textContent=wallPosts.length;
  document.getElementById('w-likes').textContent=wallPosts.reduce((s,p)=>s+p.likes,0);
}

  if(savedTodos)todos=savedTodos;
  if(savedPosts)wallPosts=savedPosts;
  
  // Fallback to localStorage if IndexedDB empty
  if(!todos.length){const ls=lsLoad(LS_TODOS_KEY);if(ls)todos=ls}
  if(!wallPosts.length){const ls=lsLoad(LS_WALL_KEY);if(ls)wallPosts=ls}
  
  // Ensure token on first visit
  await ensureToken();
  
  // Try cloud load after token is set (finds existing gist automatically)
  if(token){
    try{
      const ct=await cloudLoad('todos');if(ct&&ct.length)todos=ct;
      const cp=await cloudLoad('wallPosts');if(cp&&cp.length)wallPosts=cp;
    }catch(e){console.error('Cloud load failed:',e)}
  }
  
  // Render
  updateClock();setInterval(updateClock,1000);
  updateCountdown();setInterval(updateCountdown,1000);
  updateProgress();setInterval(updateProgress,1000);
  fetchWeather();setInterval(fetchWeather,600000);
  document.addEventListener('click',function autoSpeak(){
    if(window._tipSpeakText){
      setTimeout(()=>speakTip(),300);
      document.removeEventListener('click',autoSpeak);
    }
  },{once:true});
  document.addEventListener('touchstart',function autoSpeak2(){
    if(window._tipSpeakText){
      setTimeout(()=>speakTip(),300);
      document.removeEventListener('touchstart',autoSpeak2);
    }
  },{once:true});
  applyTimeBg();setInterval(applyTimeBg,300000);
  renderMatches();renderTodos();
  getMyId();renderEmojiBar();renderWall();
  renderJoke();
  renderMusicList();
  initMusic();
  
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  updateCopyBtn();
}

init();
</script>
</body>
</html>

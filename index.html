<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="今日助手">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>今日助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6366f1;--secondary:#ec4899;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--text:#f8fafc;--text-muted:#94a3b8;--card:rgba(255,255,255,.08);--border:rgba(255,255,255,.1);--radius:16px;--radius-sm:10px;--safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,0px)}
html{scroll-behavior:smooth}
body{font-family:-apple-system,sans-serif;min-height:100vh;min-height:100dvh;padding:12px;padding-top:calc(12px + var(--safe-top));padding-bottom:calc(12px + var(--safe-bottom));color:var(--text);background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);background-attachment:fixed;-webkit-tap-highlight-color:transparent}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;animation:orbFloat 20s ease-in-out infinite}
.bg-orb:nth-child(1){width:400px;height:400px;background:#6366f1;top:-150px;left:-150px}
.bg-orb:nth-child(2){width:350px;height:350px;background:#ec4899;bottom:-100px;right:-100px;animation-delay:-7s}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
.container{max-width:100%;position:relative;z-index:1}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:4px 0 12px}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#f8fafc,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-time{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#f8fafc,#cbd5e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-date{font-size:11px;color:var(--text-muted);text-align:right}

/* Countdown */
.countdown{background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(6,182,212,.15));border:1px solid rgba(16,185,129,.3);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.countdown.weekend{background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(236,72,153,.15));border-color:rgba(139,92,246,.3)}
.countdown-label{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px}
.countdown-time{font-size:36px;font-weight:800;letter-spacing:-1px}
.countdown-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.countdown-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:10px;overflow:hidden}
.countdown-fill{height:100%;background:linear-gradient(90deg,#10b981,#06b6d4);border-radius:2px;transition:width 1s linear}

/* Glass Card */
.card{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.badge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;color:#fff}
.card-link{font-size:11px;color:var(--text-muted);text-decoration:none}
.stats{display:flex;gap:8px;font-size:10px;color:var(--text-muted)}
.stats strong{color:#e2e8f0}

/* Weather */
.weather-row{display:flex;align-items:center;gap:12px}
.weather-icon{font-size:42px}
.weather-temp{font-size:36px;font-weight:800;line-height:1}
.weather-temp span{font-size:16px;font-weight:400;opacity:.6}
.weather-desc{font-size:14px;font-weight:600}
.weather-detail{font-size:11px;color:rgba(255,255,255,.5)}
.weather-loc{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

/* Match */
.match{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);padding:10px;margin-bottom:6px}
.match-league{font-size:9px;color:var(--text-muted);font-weight:700;letter-spacing:.5px;margin-bottom:6px}
.match-teams{display:flex;align-items:center;justify-content:space-between}
.team{display:flex;align-items:center;gap:6px}
.team.r{flex-direction:row-reverse}
.team-logo{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;border:1px solid rgba(255,255,255,.1)}
.team-name{font-size:11px;font-weight:600}
.match-vs{font-size:9px;font-weight:800;color:var(--text-muted)}
.match-time{text-align:center;margin-top:6px}
.match-time span{font-size:10px;font-weight:600;color:#818cf8;background:rgba(99,102,241,.15);padding:2px 8px;border-radius:8px}
.match-status{font-size:9px;color:var(--success);font-weight:600;margin-top:4px}
.match-status.live{color:var(--danger);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Input Group */
.input-group{display:flex;gap:6px;margin-bottom:8px}
.input{flex:1;padding:8px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);font-size:12px;color:var(--text);outline:none}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(99,102,241,.2)}
.input::placeholder{color:var(--text-muted)}
.btn{padding:8px 12px;background:linear-gradient(135deg,var(--primary),#4f46e5);color:#fff;border:none;border-radius:var(--radius-sm);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn.pink{background:linear-gradient(135deg,#8b5cf6,#6366f1)}
.btn:hover{transform:translateY(-1px)}

/* Priority */
.pri-group{display:flex;gap:2px}
.pri{width:24px;height:24px;border:1px solid rgba(255,255,255,.1);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;background:transparent}
.pri.active{border-color:var(--primary);background:rgba(99,102,241,.2)}

/* Filters */
.filters{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.filter{padding:3px 8px;border:1px solid rgba(255,255,255,.08);border-radius:10px;font-size:9px;cursor:pointer;background:transparent;color:var(--text-muted)}
.filter.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* List */
.list{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.item{display:flex;align-items:center;gap:6px;padding:7px 8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm)}
.check{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check.done{background:var(--success);border-color:var(--success)}
.check.done::after{content:'✓';color:#fff;font-size:9px;font-weight:700}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.dot.high{background:var(--danger);box-shadow:0 0 4px var(--danger)}
.dot.medium{background:var(--warning)}
.dot.low{background:var(--success)}
.item-content{flex:1;min-width:0}
.item-text{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item.completed .item-text{text-decoration:line-through;color:var(--text-muted)}
.item-time{font-size:8px;color:var(--text-muted)}
.del{width:18px;height:18px;border:none;background:none;color:var(--text-muted);cursor:pointer;font-size:11px;flex-shrink:0}
.del:hover{color:var(--danger)}
.empty{text-align:center;padding:20px;color:var(--text-muted);font-size:11px}

/* Wall */
.wall-post{padding:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);margin-bottom:6px;position:relative;border-left:3px solid}
.wall-post:nth-child(3n+1){border-left-color:#6366f1}
.wall-post:nth-child(3n+2){border-left-color:#ec4899}
.wall-post:nth-child(3n){border-left-color:#06b6d4}
.wall-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.wall-user{display:flex;align-items:center;gap:5px}
.wall-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.wall-name{font-size:9px;font-weight:600;color:var(--text-muted)}
.wall-time{font-size:8px;color:var(--text-muted)}
.wall-content{font-size:11px;line-height:1.4}
.wall-action{display:inline-flex;align-items:center;gap:2px;font-size:10px;color:var(--text-muted);cursor:pointer;background:none;border:none;padding:0;margin-top:4px}
.wall-action.liked{color:var(--danger)}
.emoji-bar{display:flex;gap:3px;margin-bottom:8px}
.emoji-btn{width:26px;height:26px;border:1px solid rgba(255,255,255,.08);border-radius:5px;background:rgba(255,255,255,.03);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}

/* Sync Status */
.sync-status{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:6px 14px;border-radius:20px;font-size:11px;z-index:100;opacity:0;transition:opacity .3s}
.sync-status.show{opacity:1}

/* Footer */
.footer{text-align:center;padding:16px 0;font-size:9px;color:var(--text-muted)}

/* Animations */
.fade{opacity:0;transform:translateY(12px);animation:fadeUp .4s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="bg-orbs"><div class="bg-orb"></div><div class="bg-orb"></div></div>
<div class="sync-status" id="sync-status">✓ 已同步</div>

<div class="container">
  <div class="header fade">
    <div><h1>Today</h1></div>
    <div><div class="header-time" id="clock">00:00</div><div class="header-date" id="date"></div></div>
  </div>

  <div class="countdown fade" style="animation-delay:.05s" id="countdown">
    <div class="countdown-label" id="cd-label">⏰ 下班倒计时</div>
    <div class="countdown-time" id="cd-time">00:00:00</div>
    <div class="countdown-sub" id="cd-sub">加载中...</div>
    <div class="countdown-bar"><div class="countdown-fill" id="cd-bar" style="width:0%"></div></div>
  </div>

  <div class="card fade" style="animation-delay:.1s">
    <div class="weather-row">
      <div class="weather-icon" id="w-icon">🌤️</div>
      <div><div class="weather-temp" id="w-temp">--<span>°C</span></div></div>
      <div style="flex:1"><div class="weather-desc" id="w-desc">加载中...</div><div class="weather-detail" id="w-detail"></div><div class="weather-loc" id="w-loc">📍 定位中...</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="card fade" style="animation-delay:.15s">
      <div class="card-header">
        <div class="card-title">🏆 电竞赛事</div>
        <a class="card-link" href="https://lpl.qq.com" target="_blank">更多 →</a>
      </div>
      <div id="match-list"></div>
    </div>

    <div class="card fade" style="animation-delay:.2s">
      <div class="card-header">
        <div class="card-title">📝 每日待办</div>
        <div class="stats"><span>📋 <strong id="t-total">0</strong></span><span>✅ <strong id="t-done">0</strong></span></div>
      </div>
      <div class="input-group">
        <input type="text" class="input" id="todo-input" placeholder="添加待办..." maxlength="100">
        <div class="pri-group">
          <button class="pri" data-p="low" onclick="setPri('low')">🟢</button>
          <button class="pri active" data-p="medium" onclick="setPri('medium')">🟡</button>
          <button class="pri" data-p="high" onclick="setPri('high')">🔴</button>
        </div>
        <button class="btn" onclick="addTodo()">+</button>
      </div>
      <div class="filters">
        <button class="filter active" onclick="filterTodo('all',this)">全部</button>
        <button class="filter" onclick="filterTodo('pending',this)">待办</button>
        <button class="filter" onclick="filterTodo('done',this)">完成</button>
      </div>
      <div class="list" id="todo-list"></div>
    </div>
  </div>

  <div class="card fade" style="animation-delay:.25s">
    <div class="card-header">
      <div class="card-title">👹 匿名吐槽墙 <span class="badge" style="background:linear-gradient(135deg,#8b5cf6,#6366f1)">ANON</span></div>
      <div class="stats"><span>💬 <strong id="w-total">0</strong></span><span>❤️ <strong id="w-likes">0</strong></span></div>
    </div>
    <div class="input-group">
      <input type="text" class="input" id="wall-input" placeholder="想吐槽点什么？" maxlength="200">
      <button class="btn pink" onclick="postWall()">发送</button>
    </div>
    <div class="emoji-bar" id="emoji-bar"></div>
    <div class="list" id="wall-list"></div>
  </div>

  <div class="footer" style="display:flex;justify-content:center;align-items:center;gap:12px">
    <span>Today Assistant · Made with ❤️</span>
    <button onclick="resetToken()" style="background:none;border:none;color:var(--text-muted);font-size:9px;cursor:pointer;text-decoration:underline">云同步设置</button>
    <button onclick="copyLink()" id="copy-link-btn" style="background:none;border:none;color:var(--text-muted);font-size:9px;cursor:pointer;text-decoration:underline;display:none">复制带Token链接</button>
  </div>
</div>

<script>
// ===== Config =====
const GITHUB_TOKEN_KEY='gh_token';
const GIST_ID_KEY='gh_gist_id';
const SKIP_TOKEN_KEY='gh_token_skipped';

// ===== IndexedDB =====
let db=null;
async function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('TodayApp',1);
    r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('data'))e.target.result.createObjectStore('data')};
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=e=>rej(e);
  });
}
async function dbPut(k,v){if(!db)await openDB();return new Promise((res,rej)=>{const t=db.transaction('data','readwrite');t.objectStore('data').put(v,k);t.oncomplete=res;t.onerror=rej})}
async function dbGet(k){if(!db)await openDB();return new Promise((res,rej)=>{const t=db.transaction('data','readonly');const r=t.objectStore('data').get(k);r.onsuccess=()=>res(r.result);r.onerror=rej})}

// ===== Cloud Sync =====
let token=localStorage.getItem(GITHUB_TOKEN_KEY)||'';
let gistId=localStorage.getItem(GIST_ID_KEY)||'';

// Check URL hash for token: #ghp_xxxx
(function(){
  const h=location.hash.slice(1);
  if(h&&h.startsWith('ghp_')){token=h;localStorage.setItem(GITHUB_TOKEN_KEY,h)}
})();
function setHashToken(t){if(t){history.replaceState(null,'','#'+t)}else{history.replaceState(null,'',location.pathname+location.search)}}

async function ensureToken(){
  if(token)return true;
  if(localStorage.getItem(SKIP_TOKEN_KEY))return false;
  return new Promise(resolve=>{
    const m=document.createElement('div');
    m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    m.innerHTML=`<div style="background:#1e293b;border-radius:16px;padding:20px;max-width:340px;width:100%;border:1px solid rgba(255,255,255,.1)">
      <h3 style="color:#f8fafc;font-size:15px;margin-bottom:6px">🔐 启用云同步</h3>
      <p style="color:#94a3b8;font-size:11px;margin-bottom:12px">输入GitHub Token以云端保存数据<br><a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank" style="color:#818cf8">点此生成Token</a></p>
      <input type="text" id="tk-input" placeholder="ghp_xxxx" style="width:100%;padding:8px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#f8fafc;font-size:12px;margin-bottom:10px">
      <div style="display:flex;gap:6px">
        <button id="tk-ok" style="flex:1;padding:8px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer">确认</button>
        <button id="tk-skip" style="flex:1;padding:8px;background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:12px;cursor:pointer">跳过</button>
      </div>
    </div>`;
    document.body.appendChild(m);
    document.getElementById('tk-ok').onclick=async()=>{
      const v=document.getElementById('tk-input').value.trim();
      const btn=document.getElementById('tk-ok');
      if(!v||!v.startsWith('ghp_')){document.getElementById('tk-input').style.borderColor='#ef4444';return}
      btn.textContent='验证中...';btn.disabled=true;
      try{
        const r=await fetch('https://api.github.com/user',{headers:{'Authorization':`token ${v}`}});
        if(!r.ok)throw new Error('验证失败');
        token=v;localStorage.setItem(GITHUB_TOKEN_KEY,v);setHashToken(v);m.remove();resolve(true);
      }catch(e){
        document.getElementById('tk-input').style.borderColor='#ef4444';
        document.getElementById('tk-input').placeholder='Token无效，请重新输入';
        btn.textContent='确认';btn.disabled=false;
      }
    };
    document.getElementById('tk-skip').onclick=()=>{localStorage.setItem(SKIP_TOKEN_KEY,'1');m.remove();resolve(false)};
    document.getElementById('tk-input').onkeypress=e=>{if(e.key==='Enter')document.getElementById('tk-ok').click()};
  });
}

async function cloudSync(key,data){
  if(!token)return;
  try{
    // Find or create gist
    if(!gistId){
      const r=await fetch('https://api.github.com/gists?per_page=100',{headers:{'Authorization':`token ${token}`}});
      if(r.ok){
        const gists=await r.json();
        const found=gists.find(g=>g.description==='TodayAssistant'&&g.files&&g.files['data.json']);
        if(found)gistId=found.id;
      }
    }
    
    const allData={todos:JSON.stringify(todos),wallPosts:JSON.stringify(wallPosts)};
    if(!gistId){
      const r=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({description:'TodayAssistant',files:{'data.json':{content:JSON.stringify(allData)}}})});
      if(!r.ok)throw new Error('创建Gist失败: '+r.status);
      const g=await r.json();
      if(!g.id)throw new Error('无效的Gist响应');
      gistId=g.id;localStorage.setItem(GIST_ID_KEY,gistId);
    }else{
      const r1=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{'Authorization':`token ${token}`}});
      if(!r1.ok)throw new Error('读取Gist失败: '+r1.status);
      const g1=await r1.json();
      let ex={};
      if(g1.files&&g1.files['data.json']){
        try{ex=JSON.parse(g1.files['data.json'].content)}catch(e){}
      }
      ex[key]=JSON.stringify(data);
      const r2=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({files:{'data.json':{content:JSON.stringify(ex)}}})});
      if(!r2.ok)throw new Error('更新Gist失败: '+r2.status);
    }
    showSync('✓ 已同步到云端');
  }catch(e){
    console.error('Sync error:',e);
    showSync('⚠️ 云同步失败，数据已本地保存');
  }
}

async function cloudLoad(key){
  if(!token)return null;
  if(!gistId){
    // Try to find existing gist
    try{
      const r=await fetch('https://api.github.com/gists?per_page=100',{headers:{'Authorization':`token ${token}`}});
      if(r.ok){
        const gists=await r.json();
        const found=gists.find(g=>g.description==='TodayAssistant'&&g.files&&g.files['data.json']);
        if(found){gistId=found.id;localStorage.setItem(GIST_ID_KEY,gistId)}
      }
    }catch(e){}
  }
  if(!gistId)return null;
  try{
    const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{'Authorization':`token ${token}`}});
    const g=await r.json();
    if(g.files&&g.files['data.json']){const d=JSON.parse(g.files['data.json'].content);return d[key]?JSON.parse(d[key]):null}
    return null;
  }catch(e){return null}
}

function showSync(msg){
  const s=document.getElementById('sync-status');s.textContent=msg;s.classList.add('show');
  setTimeout(()=>s.classList.remove('show'),2000);
}

async function resetToken(){
  if(token){
    if(confirm('当前已启用云同步，是否要重新设置Token？')){
      token='';gistId='';localStorage.removeItem(GITHUB_TOKEN_KEY);localStorage.removeItem(GIST_ID_KEY);localStorage.removeItem(SKIP_TOKEN_KEY);setHashToken('');
      showSync('已清除Token设置');updateCopyBtn();
    }
  }else{
    localStorage.removeItem(SKIP_TOKEN_KEY);
    await ensureToken();
    if(token){
      setHashToken(token);
      // Try to find and load existing cloud data
      try{
        const ct=await cloudLoad('todos');if(ct&&ct.length)todos=ct;
        const cp=await cloudLoad('wallPosts');if(cp&&cp.length)wallPosts=cp;
        renderTodos();renderWall();
      }catch(e){console.error('Load cloud data failed:',e)}
      // Then sync current data
      try{
        await cloudSync('todos',todos);
        await cloudSync('wallPosts',wallPosts);
      }catch(e){console.error('Initial sync failed:',e)}
      showSync('✓ 云同步已启用');updateCopyBtn();
    }
  }
}

function copyLink(){
  navigator.clipboard.writeText(location.href).then(()=>showSync('✓ 链接已复制，收藏此链接即可保存Token'));
}

function updateCopyBtn(){
  const btn=document.getElementById('copy-link-btn');
  if(btn)btn.style.display=token?'inline':'none';
}

// ===== State =====
let todos=[];
let wallPosts=[];
let myId='';
let curFilter='all',curPri='medium';

// ===== LocalStorage Fallback =====
const LS_TODOS_KEY='today_todos';
const LS_WALL_KEY='today_wall';
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function lsLoad(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}

// ===== Clock =====
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  const d=['日','一','二','三','四','五','六'];
  document.getElementById('date').textContent=`${n.getMonth()+1}月${n.getDate()}日 周${d[n.getDay()]}`;
}

// ===== Countdown =====
const weekendMsgs=[
  {text:'恢复元气中',sub:'今天好好休息~',icon:'🔋'},
  {text:'今日宜睡觉',sub:'赖床是对周末最大的尊重',icon:'😴'},
  {text:'快乐星球',sub:'今天只做开心的事',icon:'🌟'},
  {text:'充电模式',sub:'为下周储备能量',icon:'⚡'},
  {text:'躺平中...',sub:'人生苦短，及时行乐',icon:'🛋️'},
  {text:'游戏时间',sub:'今天可以尽情玩了',icon:'🎮'},
];

function updateCountdown(){
  const n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds(),day=n.getDay();
  const cd=document.getElementById('countdown'),label=document.getElementById('cd-label');
  
  if(day===0||day===6){
    cd.className='countdown weekend';
    const seed=(n.getFullYear()*365+n.getMonth()*31+n.getDate())%weekendMsgs.length;
    const msg=weekendMsgs[seed];
    label.textContent=`${msg.icon} ${msg.text}`;
    document.getElementById('cd-time').textContent='🎉 周末愉快';
    document.getElementById('cd-sub').textContent=msg.sub;
    document.getElementById('cd-bar').style.width='100%';
    document.getElementById('cd-bar').style.background='linear-gradient(90deg,#8b5cf6,#ec4899)';
    return;
  }
  
  cd.className='countdown';
  label.textContent='⏰ 下班倒计时';
  document.getElementById('cd-bar').style.background='linear-gradient(90deg,#10b981,#06b6d4)';
  
  const cur=h*60+m,start=9*60,end=18*60;
  if(cur<start){
    const d=start-cur;document.getElementById('cd-time').textContent=`0${Math.floor(d/60)}:${String(d%60).padStart(2,'0')}:00`;
    document.getElementById('cd-sub').textContent='距离上班还有';document.getElementById('cd-bar').style.width='0%';
  }else if(cur>=end){
    document.getElementById('cd-time').textContent='🎉 下班啦！';
    document.getElementById('cd-sub').textContent='辛苦了，好好休息~';document.getElementById('cd-bar').style.width='100%';
  }else{
    const rem=end-cur,rh=Math.floor(rem/60),rm=rem%60,rs=60-s;
    document.getElementById('cd-time').textContent=`${String(rh).padStart(2,'0')}:${String(rm).padStart(2,'0')}:${String(rs).padStart(2,'0')}`;
    document.getElementById('cd-sub').textContent=`今日已工作 ${Math.floor((cur-start)/60)}小时${(cur-start)%60}分钟`;
    document.getElementById('cd-bar').style.width=Math.min(100,Math.max(0,((cur-start)/(end-start))*100))+'%';
  }
}

// ===== Weather =====
async function fetchWeather(){
  try{
    const r=await fetch('https://wttr.in/?format=j1');
    const d=await r.json(),c=d.current_condition[0],code=parseInt(c.weatherCode);
    let icon='☁️';
    if(code>=200&&code<300)icon='⛈️';else if(code>=300&&code<600)icon='🌧️';
    else if(code>=600&&code<700)icon='❄️';else if(code>=700&&code<800)icon='🌫️';
    else if(code===800)icon='☀️';else if(code===801)icon='⛅';
    document.getElementById('w-icon').textContent=icon;
    document.getElementById('w-temp').innerHTML=`${c.temp_C}<span>°C</span>`;
    document.getElementById('w-desc').textContent=c.lang_zh?.[0]?.value||c.weatherDesc[0].value;
    document.getElementById('w-detail').textContent=`体感${c.FeelsLikeC}°C · 湿度${c.humidity}%`;
    document.getElementById('w-loc').textContent=`📍 ${d.nearest_area[0].areaName[0].value}`;
  }catch(e){}
}

// ===== Matches =====
const today=new Date().toISOString().split('T')[0];
const matches=[
  {l:'LPL',t:'16:00',t1:'TES',n1:'Top Esports',t2:'BLG',n2:'Bilibili Gaming'},
  {l:'LCK',t:'17:00',t1:'T1',n1:'T1',t2:'GEN',n2:'Gen.G'},
  {l:'LPL',t:'19:00',t1:'JDG',n1:'JD Gaming',t2:'WBG',n2:'Weibo Gaming'},
  {l:'LCK',t:'19:30',t1:'KT',n1:'KT Rolster',t2:'HLE',n2:'Hanwha Life'},
];

function renderMatches(){
  const h=new Date().getHours();
  document.getElementById('match-list').innerHTML=matches.map(x=>{
    const mh=parseInt(x.t.split(':')[0]);
    const live=h===mh;

  }).join('');
}

// ===== Todo =====
function setPri(p){curPri=p;document.querySelectorAll('.pri').forEach(b=>b.classList.toggle('active',b.dataset.p===p))}

function addTodo(){
  const inp=document.getElementById('todo-input'),text=inp.value.trim();
  if(!text)return;
  todos.unshift({id:Date.now(),text,pri:curPri,done:false,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  saveTodos();renderTodos();inp.value='';
}

function toggleTodo(id){const t=todos.find(x=>x.id===id);if(t)t.done=!t.done;saveTodos();renderTodos()}
function delTodo(id){todos=todos.filter(x=>x.id!==id);saveTodos();renderTodos()}
function filterTodo(f,btn){curFilter=f;document.querySelectorAll('.filter').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTodos()}

function renderTodos(){
  let list=todos;
  if(curFilter==='pending')list=todos.filter(t=>!t.done);
  else if(curFilter==='done')list=todos.filter(t=>t.done);
  document.getElementById('todo-list').innerHTML=list.length?list.map(t=>`<div class="item ${t.done?'completed':''}"><div class="check ${t.done?'done':''}" onclick="toggleTodo(${t.id})"></div><div class="dot ${t.pri}"></div><div class="item-content"><div class="item-text">${t.text}</div><div class="item-time">${t.time}</div></div><button class="del" onclick="delTodo(${t.id})">×</button></div>`).join(''):'<div class="empty">暂无待办</div>';
  document.getElementById('t-total').textContent=todos.length;
  document.getElementById('t-done').textContent=todos.filter(t=>t.done).length;
}

async function saveTodos(){
  lsSave(LS_TODOS_KEY,todos);
  try{await dbPut('todos',todos)}catch(e){console.error('IndexedDB save failed:',e)}
  try{await cloudSync('todos',todos)}catch(e){console.error('Cloud sync failed:',e)}
}

// ===== Wall =====
const emojis=['😊','😎','🤔','😤','😴','🎉','💪','🔥','💯','⭐','💖','🚀','👻','🐱','☕','🎮'];
const adjs=['快乐的','忧伤的','暴躁的','佛系的','摸鱼的','加班的','熬夜的','干饭的','发呆的','社恐的','社牛的','内卷的','躺平的','摆烂的'];
const nouns=['小猫','小狗','仓鼠','熊猫','柴犬','橘猫','程序员','学生','打工人','老师'];
const pcolors=['#6366f1','#ec4899','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6'];

function getMyId(){if(!myId){myId=localStorage.getItem('myId');if(!myId){myId=adjs[Math.floor(Math.random()*adjs.length)]+nouns[Math.floor(Math.random()*nouns.length)]+Math.floor(Math.random()*999+1);localStorage.setItem('myId',myId)}}return myId}
function getColor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return pcolors[Math.abs(h)%pcolors.length]}
function getEmoji(){return emojis[Math.floor(Math.random()*emojis.length)]}
function timeAgo(ts){const d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return'刚刚';if(m<60)return m+'分钟前';const h=Math.floor(m/60);if(h<24)return h+'小时前';return Math.floor(h/24)+'天前'}

function renderEmojiBar(){document.getElementById('emoji-bar').innerHTML=['😊','😎','😤','🔥','💯','❤️','🎉','💪'].map(e=>`<button class="emoji-btn" onclick="insertEmoji('${e}')">${e}</button>`).join('')}
function insertEmoji(e){const i=document.getElementById('wall-input');i.value+=e;i.focus()}

function postWall(){
  const inp=document.getElementById('wall-input'),text=inp.value.trim();
  if(!text)return;
  wallPosts.unshift({id:Date.now(),userId:getMyId(),text,emoji:getEmoji(),color:getColor(getMyId()),likes:0,likedBy:[],time:Date.now()});
  saveWall();renderWall();inp.value='';
}

function likeWall(id){
  const p=wallPosts.find(x=>x.id===id);if(!p)return;
  const mid=getMyId();
  if(p.likedBy.includes(mid)){p.likedBy=p.likedBy.filter(i=>i!==mid);p.likes--}
  else{p.likedBy.push(mid);p.likes++}
  saveWall();renderWall();
}

function renderWall(){
  const list=document.getElementById('wall-list'),mid=getMyId();
  if(!wallPosts.length){list.innerHTML='<div class="empty">💬 还没有吐槽，来第一条吧！</div>';return}
  list.innerHTML=wallPosts.slice(0,20).map(p=>{
    const isMe=p.userId===mid,isLiked=p.likedBy.includes(mid);
    return`<div class="wall-post" style="border-left-color:${p.color}"><div class="wall-header"><div class="wall-user"><div class="wall-avatar" style="background:${p.color}">${p.emoji}</div><span class="wall-name">${p.userId}${isMe?' (我)':''}</span></div><span class="wall-time">${timeAgo(p.time)}</span></div><div class="wall-content">${p.text}</div><button class="wall-action ${isLiked?'liked':''}" onclick="likeWall(${p.id})">${isLiked?'❤️':'🤍'} ${p.likes}</button></div>`;
  }).join('');
  document.getElementById('w-total').textContent=wallPosts.length;
  document.getElementById('w-likes').textContent=wallPosts.reduce((s,p)=>s+p.likes,0);
}

async function saveWall(){
  lsSave(LS_WALL_KEY,wallPosts);
  try{await dbPut('wallPosts',wallPosts)}catch(e){console.error('IndexedDB save failed:',e)}
  try{await cloudSync('wallPosts',wallPosts)}catch(e){console.error('Cloud sync failed:',e)}
}

// ===== Event Listeners =====
document.getElementById('todo-input').addEventListener('keypress',e=>{if(e.key==='Enter')addTodo()});
document.getElementById('wall-input').addEventListener('keypress',e=>{if(e.key==='Enter')postWall()});

// ===== Init =====
async function init(){
  try{await openDB()}catch(e){console.error('IndexedDB open failed:',e)}
  
  // Load from IndexedDB
  let savedTodos=null,savedPosts=null;
  try{savedTodos=await dbGet('todos')}catch(e){}
  try{savedPosts=await dbGet('wallPosts')}catch(e){}
  
  if(savedTodos)todos=savedTodos;
  if(savedPosts)wallPosts=savedPosts;
  
  // Fallback to localStorage if IndexedDB empty
  if(!todos.length){const ls=lsLoad(LS_TODOS_KEY);if(ls)todos=ls}
  if(!wallPosts.length){const ls=lsLoad(LS_WALL_KEY);if(ls)wallPosts=ls}
  
  // Ensure token on first visit
  await ensureToken();
  
  // Try cloud load after token is set (finds existing gist automatically)
  if(token){
    try{
      const ct=await cloudLoad('todos');if(ct&&ct.length)todos=ct;
      const cp=await cloudLoad('wallPosts');if(cp&&cp.length)wallPosts=cp;
    }catch(e){console.error('Cloud load failed:',e)}
  }
  
  // Render
  updateClock();setInterval(updateClock,1000);
  updateCountdown();setInterval(updateCountdown,1000);
  fetchWeather();setInterval(fetchWeather,600000);
  renderMatches();renderTodos();
  getMyId();renderEmojiBar();renderWall();
  
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  updateCopyBtn();
}

init();
</script>

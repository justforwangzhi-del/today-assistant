<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="今日助手">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>今日助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#6366f1;--primary-light:#818cf8;--primary-dark:#4f46e5;
  --secondary:#ec4899;--accent:#06b6d4;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --text:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
  --bg-start:#0f172a;--bg-end:#1e293b;
  --card:rgba(255,255,255,.08);--card-hover:rgba(255,255,255,.12);
  --border:rgba(255,255,255,.1);--border-light:rgba(255,255,255,.15);
  --shadow:0 8px 32px rgba(0,0,0,.3);
  --radius:20px;--radius-sm:12px;--radius-xs:8px;
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;min-height:100dvh;
  padding:12px;padding-top:calc(12px + var(--safe-top));
  padding-bottom:calc(12px + var(--safe-bottom));
  color:#f8fafc;
  background:linear-gradient(135deg,var(--bg-start),var(--bg-end),#0f172a);
  background-attachment:fixed;position:relative;overflow-x:hidden;
  line-height:1.5;-webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}

/* Background */
.bg-effects{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:orbFloat 20s ease-in-out infinite}
.bg-orb-1{width:400px;height:400px;background:linear-gradient(135deg,#6366f1,#8b5cf6);top:-150px;left:-150px}
.bg-orb-2{width:350px;height:350px;background:linear-gradient(135deg,#ec4899,#f472b6);bottom:-100px;right:-100px;animation-delay:-7s}
.bg-orb-3{width:250px;height:250px;background:linear-gradient(135deg,#06b6d4,#22d3ee);top:50%;left:50%;animation-delay:-14s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-40px) scale(1.08)}66%{transform:translate(-25px,25px) scale(.92)}}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:50px 50px}

/* Container */
.container{max-width:100%;margin:0 auto;position:relative;z-index:1}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:4px 0 12px}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#f8fafc,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-time{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#f8fafc,#cbd5e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-date{font-size:11px;color:var(--text-muted);text-align:right}

/* Countdown Card */
.countdown-card{
  background:linear-gradient(135deg,rgba(16,185,129,.2) 0%,rgba(6,182,212,.15) 100%);
  border:1px solid rgba(16,185,129,.3);border-radius:var(--radius);
  padding:16px 20px;margin-bottom:12px;position:relative;overflow:hidden;
}
.countdown-card::before{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(16,185,129,.15) 0%,transparent 70%);pointer-events:none}
.countdown-label{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.countdown-main{display:flex;align-items:baseline;gap:12px}
.countdown-time{font-size:42px;font-weight:800;letter-spacing:-1px;color:#f8fafc;font-variant-numeric:tabular-nums}
.countdown-unit{font-size:14px;color:rgba(255,255,255,.5);font-weight:500}
.countdown-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px}
.countdown-progress{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:12px;overflow:hidden}
.countdown-bar{height:100%;background:linear-gradient(90deg,#10b981,#06b6d4);border-radius:2px;transition:width 1s linear}

/* Glass Card */
.glass-card{
  background:var(--card);backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;transition:all .3s;
  box-shadow:0 4px 24px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.05);
  margin-bottom:12px;
}
.glass-card:last-child{margin-bottom:0}

/* Section */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-badge{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;font-size:9px;padding:3px 8px;border-radius:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.section-link{color:var(--text-muted);font-size:11px;text-decoration:none;display:flex;align-items:center;gap:4px}
.section-link:hover{color:#f8fafc}

/* Weather */
.weather-main{display:flex;align-items:center;gap:16px;margin-bottom:8px}
.weather-icon{font-size:48px;animation:weatherPulse 3s ease-in-out infinite}
@keyframes weatherPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.weather-temp{font-size:40px;font-weight:800;line-height:1;letter-spacing:-1px}
.weather-temp span{font-size:18px;font-weight:400;opacity:.7}
.weather-info{flex:1}
.weather-desc{font-size:16px;font-weight:600;margin-bottom:4px}
.weather-detail{font-size:12px;color:rgba(255,255,255,.6);line-height:1.6}
.weather-location{font-size:11px;color:rgba(255,255,255,.4);margin-top:6px;display:flex;align-items:center;gap:4px}
.weather-alerts{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:6px}
.alert-item{font-size:11px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:var(--radius-xs);border:1px solid rgba(255,255,255,.04)}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

/* Match List */
.match-list{display:flex;flex-direction:column;gap:8px}
.match-item{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
  border-radius:var(--radius-sm);padding:12px;transition:all .25s;
  position:relative;overflow:hidden;
}
.match-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--primary),var(--secondary));opacity:0;transition:opacity .25s}
.match-item:hover{background:rgba(255,255,255,.06);transform:translateX(3px)}
.match-item:hover::before{opacity:1}
.match-league{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.match-teams{display:flex;align-items:center;justify-content:space-between;gap:8px}
.team{display:flex;align-items:center;gap:8px;flex:1}
.team.right{flex-direction:row-reverse;text-align:right}
.team-logo{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#f8fafc;border:1px solid rgba(255,255,255,.1)}
.team-name{font-size:12px;font-weight:600;color:#e2e8f0}
.match-vs{font-size:10px;font-weight:800;color:var(--text-muted);letter-spacing:1px}
.match-meta{text-align:center;margin-top:8px}
.match-time{display:inline-block;font-size:11px;font-weight:600;color:var(--primary-light);background:rgba(99,102,241,.15);padding:3px 10px;border-radius:12px}
.match-status{font-size:10px;color:var(--success);font-weight:600;margin-top:4px}
.match-status.live{color:var(--danger);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Todo */
.todo-input-group{display:flex;gap:6px;margin-bottom:10px}
.todo-input{flex:1;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-xs);font-size:13px;color:#f8fafc;outline:none}
.todo-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(99,102,241,.2)}
.todo-input::placeholder{color:var(--text-muted)}
.todo-btn{padding:10px 14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:var(--radius-xs);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.todo-btn:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(99,102,241,.3)}
.priority-select{display:flex;gap:3px}
.pri-btn{width:28px;height:28px;border:1px solid rgba(255,255,255,.1);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;background:transparent;transition:all .2s}
.pri-btn.active{border-color:var(--primary);background:rgba(99,102,241,.2)}
.todo-filters{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.todo-filter{padding:4px 10px;border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:10px;cursor:pointer;background:transparent;color:var(--text-muted);transition:all .2s}
.todo-filter.active{background:var(--primary);border-color:var(--primary);color:#fff}
.todo-stats{display:flex;gap:10px;font-size:10px;color:var(--text-muted)}
.todo-stats strong{color:#e2e8f0}
.todo-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.todo-list::-webkit-scrollbar{width:3px}
.todo-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.todo-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-xs);transition:all .2s}
.todo-item:hover{background:rgba(255,255,255,.06)}
.todo-check{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.todo-check.done{background:var(--success);border-color:var(--success)}
.todo-check.done::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.todo-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.todo-dot.high{background:var(--danger);box-shadow:0 0 6px var(--danger)}
.todo-dot.medium{background:var(--warning)}
.todo-dot.low{background:var(--success)}
.todo-content{flex:1;min-width:0}
.todo-text{font-size:12px;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.todo-item.completed .todo-text{text-decoration:line-through;color:var(--text-muted)}
.todo-time{font-size:9px;color:var(--text-muted);margin-top:1px}
.todo-del{width:20px;height:20px;border:none;background:none;color:var(--text-muted);cursor:pointer;border-radius:4px;font-size:12px;flex-shrink:0}
.todo-del:hover{color:var(--danger)}
.todo-empty{text-align:center;padding:24px;color:var(--text-muted);font-size:12px}

/* Wall */
.wall-input-wrap{display:flex;gap:6px;margin-bottom:10px}
.wall-input{flex:1;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-xs);font-size:13px;color:#f8fafc;outline:none}
.wall-input:focus{border-color:var(--secondary);box-shadow:0 0 0 2px rgba(236,72,153,.2)}
.wall-input::placeholder{color:var(--text-muted)}
.wall-btn{padding:10px 14px;background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;border:none;border-radius:var(--radius-xs);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.wall-emoji-bar{display:flex;gap:4px;margin-bottom:10px}
.emoji-btn{width:30px;height:30px;border:1px solid rgba(255,255,255,.08);border-radius:6px;background:rgba(255,255,255,.03);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.emoji-btn:hover{background:rgba(255,255,255,.1)}
.wall-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.wall-list::-webkit-scrollbar{width:3px}
.wall-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.wall-post{padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-xs);position:relative;overflow:hidden}
.wall-post::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px}
.wall-post:nth-child(4n+1)::before{background:linear-gradient(180deg,#6366f1,#8b5cf6)}
.wall-post:nth-child(4n+2)::before{background:linear-gradient(180deg,#ec4899,#f472b6)}
.wall-post:nth-child(4n+3)::before{background:linear-gradient(180deg,#06b6d4,#22d3ee)}
.wall-post:nth-child(4n)::before{background:linear-gradient(180deg,#10b981,#34d399)}
.wall-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.wall-user{display:flex;align-items:center;gap:6px}
.wall-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.wall-name{font-size:10px;font-weight:600;color:var(--text-muted)}
.wall-time{font-size:9px;color:var(--text-muted)}
.wall-content{font-size:12px;color:#e2e8f0;line-height:1.5}
.wall-actions{margin-top:6px}
.wall-action{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--text-muted);cursor:pointer;background:none;border:none;padding:0}
.wall-action:hover{color:var(--secondary)}
.wall-action.liked{color:var(--danger)}
.wall-empty{text-align:center;padding:24px;color:var(--text-muted);font-size:12px}

/* Animations */
.fade-up{opacity:0;transform:translateY(16px);animation:fadeUp .5s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* Footer */
.footer{text-align:center;padding:20px 0;font-size:10px;color:var(--text-muted)}

/* Mobile */
@media(max-width:480px){
  body{padding:10px;padding-top:calc(10px + var(--safe-top))}
  .header{padding:2px 0 10px}
  .header h1{font-size:18px}
  .header-time{font-size:28px}
  .countdown-time{font-size:36px}
  .glass-card{padding:14px;border-radius:16px}
  .weather-icon{font-size:40px}
  .weather-temp{font-size:34px}
  .weather-desc{font-size:14px}
}

/* PWA */
@media(display-mode:standalone){body{padding-top:calc(12px + var(--safe-top) + 16px)}}
@supports(padding-top:env(safe-area-inset-top)){body{padding-top:calc(12px + env(safe-area-inset-top))}}
</style>
</head>
<body>

<div class="bg-effects">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-grid"></div>
</div>

<div class="container">
  <!-- Header -->
  <div class="header fade-up">
    <div>
      <h1>Today</h1>
    </div>
    <div>
      <div class="header-time" id="header-time">00:00</div>
      <div class="header-date" id="header-date"></div>
    </div>
  </div>

  <!-- Countdown -->
  <div class="countdown-card fade-up" style="animation-delay:.05s">
    <div class="countdown-label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      下班倒计时
    </div>
    <div class="countdown-main">
      <div class="countdown-time" id="countdown-time">00:00:00</div>
    </div>
    <div class="countdown-sub" id="countdown-sub">距离下班还有...</div>
    <div class="countdown-progress">
      <div class="countdown-bar" id="countdown-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- Weather -->
  <div class="glass-card fade-up" style="animation-delay:.1s">
    <div class="weather-main">
      <div class="weather-icon" id="weather-icon">🌤️</div>
      <div>
        <div class="weather-temp" id="weather-temp">--<span>°C</span></div>
      </div>
      <div class="weather-info">
        <div class="weather-desc" id="weather-desc">加载中...</div>
        <div class="weather-detail" id="weather-detail"></div>
        <div class="weather-location" id="weather-location">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          定位中...
        </div>
      </div>
    </div>
    <div class="weather-alerts" id="weather-alerts"></div>
  </div>

  <!-- Grid -->
  <div class="grid">
    <!-- Esports -->
    <div class="glass-card fade-up" style="animation-delay:.15s">
      <div class="section-header">
        <div class="section-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          电竞赛事
        </div>
        <a class="section-link" href="https://lpl.qq.com" target="_blank">更多 →</a>
      </div>
      <div class="match-list" id="match-list"></div>
    </div>

    <!-- Todo -->
    <div class="glass-card fade-up" style="animation-delay:.2s">
      <div class="section-header">
        <div class="section-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          每日待办
        </div>
        <div class="todo-stats">
          <span>📋 <strong id="todo-total">0</strong></span>
          <span>✅ <strong id="todo-done">0</strong></span>
        </div>
      </div>
      <div class="todo-input-group">
        <input type="text" class="todo-input" id="todo-input" placeholder="添加待办..." maxlength="100" onkeypress="if(event.key==='Enter')addTodo()">
        <div class="priority-select">
          <button class="pri-btn" data-p="low" onclick="setPri('low')">🟢</button>
          <button class="pri-btn active" data-p="medium" onclick="setPri('medium')">🟡</button>
          <button class="pri-btn" data-p="high" onclick="setPri('high')">🔴</button>
        </div>
        <button class="todo-btn" onclick="addTodo()">+</button>
      </div>
      <div class="todo-filters">
        <button class="todo-filter active" onclick="filterTodo('all',this)">全部</button>
        <button class="todo-filter" onclick="filterTodo('pending',this)">待办</button>
        <button class="todo-filter" onclick="filterTodo('completed',this)">完成</button>
      </div>
      <div class="todo-list" id="todo-list"></div>
    </div>
  </div>

  <!-- Wall -->
  <div class="glass-card fade-up" style="animation-delay:.25s">
    <div class="section-header">
      <div class="section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        匿名吐槽墙
        <span class="section-badge" style="background:linear-gradient(135deg,#8b5cf6,#6366f1)">👹</span>
      </div>
      <div class="todo-stats">
        <span>💬 <strong id="wall-total">0</strong></span>
        <span>❤️ <strong id="wall-likes">0</strong></span>
      </div>
    </div>
    <div class="wall-input-wrap">
      <input type="text" class="wall-input" id="wall-input" placeholder="想吐槽点什么？" maxlength="200" onkeypress="if(event.key==='Enter')postWall()">
      <button class="wall-btn" onclick="postWall()">发送</button>
    </div>
    <div class="wall-emoji-bar" id="wall-emoji-bar"></div>
    <div class="wall-list" id="wall-list"></div>
  </div>

  <div class="footer">Today Assistant · Made with ❤️</div>
</div>

<script>
// ===== Clock =====
function updateClock(){
  const now=new Date();
  document.getElementById('header-time').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const days=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  document.getElementById('header-date').textContent=`${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
}

// ===== Countdown =====

  {text:'恢复元气中',sub:'今天好好休息吧~',icon:'🔋'},

function updateCountdown(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
  const day=now.getDay(); // 0=Sun, 6=Sat
  
  const countdownCard=document.querySelector('.countdown-card');
  const countdownLabel=document.querySelector('.countdown-label');
  
  // Weekend or non-workday
  if(day===0||day===6){
    countdownCard.style.background='linear-gradient(135deg,rgba(139,92,246,.2) 0%,rgba(236,72,153,.15) 100%)';
    countdownCard.style.borderColor='rgba(139,92,246,.3)';
    
    // Pick a message based on date for consistency within the day
    const seed=(now.getFullYear()*365+now.getMonth()*31+now.getDate())%weekendMsgs.length;
    const msg=weekendMsgs[seed];
    
    countdownLabel.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${msg.icon} ${msg.text}`;
    document.getElementById('countdown-time').textContent='🎉 周末愉快';
    document.getElementById('countdown-sub').textContent=msg.sub;
    document.getElementById('countdown-bar').style.width='100%';
    document.getElementById('countdown-bar').style.background='linear-gradient(90deg,#8b5cf6,#ec4899)';
    return;
  }
  
  // Workday styling
  countdownCard.style.background='linear-gradient(135deg,rgba(16,185,129,.2) 0%,rgba(6,182,212,.15) 100%)';
  countdownCard.style.borderColor='rgba(16,185,129,.3)';
  countdownLabel.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>下班倒计时';
  document.getElementById('countdown-bar').style.background='linear-gradient(90deg,#10b981,#06b6d4)';
  
  const workStart=9*60;
  const workEnd=18*60;
  const currentMinutes=h*60+m;
  const totalWork=workEnd-workStart;
  const elapsed=currentMinutes-workStart;
  const remaining=workEnd-currentMinutes;
  
  if(currentMinutes<workStart){
    const diff=workStart-currentMinutes;
    const dh=Math.floor(diff/60);
    const dm=diff%60;
    document.getElementById('countdown-time').textContent=`0${dh}:${String(dm).padStart(2,'0')}:00`;
    document.getElementById('countdown-sub').textContent='距离上班还有';
    document.getElementById('countdown-bar').style.width='0%';
  }else if(currentMinutes>=workEnd){
    document.getElementById('countdown-time').textContent='🎉 下班啦！';
    document.getElementById('countdown-sub').textContent='辛苦了，好好休息~';
    document.getElementById('countdown-bar').style.width='100%';
  }else{
    const rh=Math.floor(remaining/60);
    const rm=remaining%60;
    const rs=60-s;
    document.getElementById('countdown-time').textContent=`${String(rh).padStart(2,'0')}:${String(rm).padStart(2,'0')}:${String(rs).padStart(2,'0')}`;
    document.getElementById('countdown-sub').textContent=`今日已工作 ${Math.floor(elapsed/60)}小时${elapsed%60}分钟`;
    const progress=Math.min(100,Math.max(0,(elapsed/totalWork)*100));
    document.getElementById('countdown-bar').style.width=progress+'%';
  }
}

const weatherAlerts={
  hot:['🥵 高温预警：注意防暑降温','🧊 建议：室内活动，避免外出'],
  cold:['🥶 低温预警：注意保暖','☕ 建议：喝杯热饮暖暖身子'],
  rain:['☂️ 雨天提醒：记得带伞','🚗 建议：注意路面湿滑'],
  fog:['🌫️ 大雾提醒：注意安全','🚗 建议：开启雾灯，减速慢行'],
  default:['🌤️ 今天天气不错','💧 提醒：记得多喝水']
};

function getAlerts(code,temp){
  if(code>=200&&code<700)return[...weatherAlerts.rain];
  if(code>=700&&code<800)return[...weatherAlerts.fog];
  if(parseInt(temp)>=35)return[...weatherAlerts.hot];
  if(parseInt(temp)<=0)return[...weatherAlerts.cold];
  return[...weatherAlerts.default];
}

function getIcon(code){
  if(code>=200&&code<300)return'⛈️';if(code>=300&&code<600)return'🌧️';
  if(code>=600&&code<700)return'❄️';if(code>=700&&code<800)return'🌫️';
  if(code===800)return'☀️';if(code===801)return'⛅';return'☁️';
}

function getCachedLocation(){
  try{const c=localStorage.getItem('userLocation');if(c){const d=JSON.parse(c);if(Date.now()-d.timestamp<3600000)return d;}}catch(e){}
  return null;
}

function cacheLocation(lat,lon){try{localStorage.setItem('userLocation',JSON.stringify({lat,lon,timestamp:Date.now()}));}catch(e){}}

async function fetchWeather(){
  const cached=getCachedLocation();
  if(cached){try{await fetchWeatherByCoords(cached.lat,cached.lon);return;}catch(e){}}
  
  if('geolocation' in navigator){
    try{
      const perm=await navigator.permissions.query({name:'geolocation'});
      if(perm.state==='granted'){
        navigator.geolocation.getCurrentPosition(
          async(p)=>{cacheLocation(p.coords.latitude,p.coords.longitude);await fetchWeatherByCoords(p.coords.latitude,p.coords.longitude);},
          ()=>fetchWeatherByIP(),{timeout:5000,maximumAge:600000}
        );return;
      }
    }catch(e){}
  }
  fetchWeatherByIP();
}

async function fetchWeatherByCoords(lat,lon){
  const res=await fetch(`https://wttr.in/${lat},${lon}?format=j1`);
  const data=await res.json();
  const c=data.current_condition[0],code=parseInt(c.weatherCode);
  document.getElementById('weather-icon').textContent=getIcon(code);
  document.getElementById('weather-temp').innerHTML=`${c.temp_C}<span>°C</span>`;
  document.getElementById('weather-desc').textContent=c.lang_zh?.[0]?.value||c.weatherDesc[0].value;
  document.getElementById('weather-detail').innerHTML=`体感${c.FeelsLikeC}°C · 湿度${c.humidity}% · 风速${c.windspeedKmph}km/h`;
  document.getElementById('weather-location').innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${data.nearest_area[0].areaName[0].value}`;
  document.getElementById('weather-alerts').innerHTML=getAlerts(code,c.temp_C).map(a=>`<div class="alert-item">${a}</div>`).join('');
}

async function fetchWeatherByIP(){
  try{
    const res=await fetch('https://wttr.in/?format=j1');
    const data=await res.json();
    const c=data.current_condition[0],code=parseInt(c.weatherCode);
    document.getElementById('weather-icon').textContent=getIcon(code);
    document.getElementById('weather-temp').innerHTML=`${c.temp_C}<span>°C</span>`;
    document.getElementById('weather-desc').textContent=c.lang_zh?.[0]?.value||c.weatherDesc[0].value;
    document.getElementById('weather-detail').innerHTML=`体感${c.FeelsLikeC}°C · 湿度${c.humidity}%`;
    document.getElementById('weather-location').innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${data.nearest_area[0].areaName[0].value}`;
    document.getElementById('weather-alerts').innerHTML=getAlerts(code,c.temp_C).map(a=>`<div class="alert-item">${a}</div>`).join('');
  }catch(e){
    document.getElementById('weather-desc').textContent='无法获取天气';
    document.getElementById('weather-location').innerHTML='⚠️ 请检查网络';
  }
}

// ===== Cloud Sync =====
let GITHUB_TOKEN=localStorage.getItem('githubToken')||'';
let cloudGistId=localStorage.getItem('gistId')||'';

async function ensureToken(){
  if(GITHUB_TOKEN)return true;
  return new Promise(resolve=>{
    const modal=document.createElement('div');
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    modal.innerHTML=`
      <div style="background:#1e293b;border-radius:16px;padding:24px;max-width:360px;width:100%;border:1px solid rgba(255,255,255,.1)">
        <h3 style="color:#f8fafc;font-size:16px;margin-bottom:8px">🔐 启用云同步</h3>
        <p style="color:#94a3b8;font-size:12px;margin-bottom:16px">输入GitHub Token以同步数据到云端<br><a href="https://github.com/settings/tokens" target="_blank" style="color:#818cf8">点此生成Token</a>（勾选gist权限）</p>
        <input type="text" id="token-input" placeholder="ghp_xxxxxxxxxxxx" style="width:100%;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#f8fafc;font-size:14px;margin-bottom:12px">
        <div style="display:flex;gap:8px">
          <button id="token-ok" style="flex:1;padding:10px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">确认</button>
          <button id="token-skip" style="flex:1;padding:10px;background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:13px;cursor:pointer">跳过</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    
    document.getElementById('token-ok').onclick=()=>{
      const val=document.getElementById('token-input').value.trim();
      if(val&&val.startsWith('ghp_')){
        GITHUB_TOKEN=val;
        localStorage.setItem('githubToken',val);
        modal.remove();
        resolve(true);
      }else{
        document.getElementById('token-input').style.borderColor='#ef4444';
      }
    };
    document.getElementById('token-skip').onclick=()=>{modal.remove();resolve(false)};
    document.getElementById('token-input').onkeypress=(e)=>{if(e.key==='Enter')document.getElementById('token-ok').click()};
  });
}

async function cloudSave(key,data){
  if(!GITHUB_TOKEN)return false;
  try{
    const payload={};
    payload[key]=JSON.stringify(data);
    
    if(!cloudGistId){
      const res=await fetch('https://api.github.com/gists',{
        method:'POST',
        headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Content-Type':'application/json'},
        body:JSON.stringify({description:'Today Assistant Data',files:{'data.json':{content:JSON.stringify(payload)}}})
      });
      const gist=await res.json();
      cloudGistId=gist.id;
      localStorage.setItem('gistId',cloudGistId);
    }else{
      const res=await fetch(`https://api.github.com/gists/${cloudGistId}`,{
        headers:{'Authorization':`token ${GITHUB_TOKEN}`}
      });
      const gist=await res.json();
      let existing={};
      if(gist.files&&gist.files['data.json'])existing=JSON.parse(gist.files['data.json'].content);
      Object.assign(existing,payload);
      
      await fetch(`https://api.github.com/gists/${cloudGistId}`,{
        method:'PATCH',
        headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Content-Type':'application/json'},
        body:JSON.stringify({files:{'data.json':{content:JSON.stringify(existing)}}})
      });
    }
    return true;
  }catch(e){console.error('Cloud save failed:',e);return false}
}

async function cloudLoad(key){
  if(!GITHUB_TOKEN||!cloudGistId)return null;
  try{
    const res=await fetch(`https://api.github.com/gists/${cloudGistId}`,{
      headers:{'Authorization':`token ${GITHUB_TOKEN}`}
    });
    const gist=await res.json();
    if(gist.files&&gist.files['data.json']){
      const data=JSON.parse(gist.files['data.json'].content);
      return data[key]?JSON.parse(data[key]):null;
    }
    return null;
  }catch(e){console.error('Cloud load failed:',e);return null}
}

async function saveTodos(){
  try{localStorage.setItem('todos',JSON.stringify(todos))}catch(e){}
  if(GITHUB_TOKEN){try{await cloudSave('todos',todos)}catch(e){console.log('Cloud save error:',e)}}
}

async function saveWall(){
  try{localStorage.setItem('wallPosts',JSON.stringify(wallPosts))}catch(e){}
  if(GITHUB_TOKEN){try{await cloudSave('wallPosts',wallPosts)}catch(e){console.log('Cloud save error:',e)}}
}

async function loadCloudData(){
  if(!GITHUB_TOKEN){
    const hasToken=await ensureToken();
    if(!hasToken)return;
  }
  
  try{
    const cloudTodos=await cloudLoad('todos');
    if(cloudTodos&&cloudTodos.length>0){
      const localTodos=JSON.parse(localStorage.getItem('todos')||'[]');
      const merged=mergeData(localTodos,cloudTodos);
      todos=merged;
      try{localStorage.setItem('todos',JSON.stringify(todos))}catch(e){}
      renderTodo();
    }
    
    const cloudPosts=await cloudLoad('wallPosts');
    if(cloudPosts&&cloudPosts.length>0){
      const localPosts=JSON.parse(localStorage.getItem('wallPosts')||'[]');
      const merged=mergeData(localPosts,cloudPosts);
      wallPosts=merged;
      try{localStorage.setItem('wallPosts',JSON.stringify(wallPosts))}catch(e){}
      renderWall();
    }
  }catch(e){console.error('Cloud load failed:',e)}
}

function mergeData(local,cloud){
  const map=new Map();
  local.forEach(item=>map.set(item.id,item));
  cloud.forEach(item=>{if(!map.has(item.id))map.set(item.id,item)});
  return Array.from(map.values()).sort((a,b)=>b.id-a.id);
}

function setPri(p){curPri=p;document.querySelectorAll('.pri-btn').forEach(b=>b.classList.toggle('active',b.dataset.p===p))}

function addTodo(){
  const inp=document.getElementById('todo-input');
  const text=inp.value.trim();
  if(!text)return;
  todos.unshift({id:Date.now(),text,pri:curPri,done:false,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  // 同步保存到本地
  try{localStorage.setItem('todos',JSON.stringify(todos))}catch(e){console.error('Local save failed:',e)}
  renderTodo();
  inp.value='';
  // 异步云同步
  if(GITHUB_TOKEN)cloudSave('todos',todos).catch(()=>{});
}

function toggleTodo(id){
  const todo=todos.find(t=>t.id===id);
  if(todo)todo.done=!todo.done;
  try{localStorage.setItem('todos',JSON.stringify(todos))}catch(e){}
  renderTodo();
  if(GITHUB_TOKEN)cloudSave('todos',todos).catch(()=>{});
}

function delTodo(id){
  todos=todos.filter(t=>t.id!==id);
  try{localStorage.setItem('todos',JSON.stringify(todos))}catch(e){}
  renderTodo();
  if(GITHUB_TOKEN)cloudSave('todos',todos).catch(()=>{});
}
function filterTodo(f,btn){curFilter=f;document.querySelectorAll('.todo-filter').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTodo()}

function renderTodo(){
  let list=todos;
  if(curFilter==='pending')list=todos.filter(t=>!t.done);
  else if(curFilter==='completed')list=todos.filter(t=>t.done);
  document.getElementById('todo-list').innerHTML=list.length?list.map(t=>`<div class="todo-item ${t.done?'completed':''}"><div class="todo-check ${t.done?'done':''}" onclick="toggleTodo(${t.id})"></div><div class="todo-dot ${t.pri}"></div><div class="todo-content"><div class="todo-text">${t.text}</div><div class="todo-time">${t.time}</div></div><button class="todo-del" onclick="delTodo(${t.id})">×</button></div>`).join(''):'<div class="todo-empty">暂无待办事项</div>';
  document.getElementById('todo-total').textContent=todos.length;
  document.getElementById('todo-done').textContent=todos.filter(t=>t.done).length;
}

// ===== Wall =====
const wallEmojis=['😊','😎','🤔','😤','😴','🎉','💪','🔥','💯','⭐','💖','🚀','👻','🐱','☕','🎮'];
const adjectives=['快乐的','忧伤的','暴躁的','佛系的','摸鱼的','加班的','熬夜的','干饭的','发呆的','社恐的','社牛的','内卷的','躺平的','摆烂的'];
const nouns=['小猫','小狗','仓鼠','熊猫','柴犬','橘猫','程序员','学生','打工人','老师'];
const colors=['#6366f1','#ec4899','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6'];

let wallPosts=JSON.parse(localStorage.getItem('wallPosts'))||[];
let myId=localStorage.getItem('myWallId');

function generateId(){return adjectives[Math.floor(Math.random()*adjectives.length)]+nouns[Math.floor(Math.random()*nouns.length)]+Math.floor(Math.random()*999+1)}
function getMyId(){if(!myId){myId=generateId();localStorage.setItem('myWallId',myId)}return myId}
function getColor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return colors[Math.abs(h)%colors.length]}
function getEmoji(){return wallEmojis[Math.floor(Math.random()*wallEmojis.length)]}
function timeAgo(ts){const d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return'刚刚';if(m<60)return m+'分钟前';const h=Math.floor(m/60);if(h<24)return h+'小时前';return Math.floor(h/24)+'天前'}

function renderEmojiBar(){document.getElementById('wall-emoji-bar').innerHTML=['😊','😎','😤','🔥','💯','❤️','🎉','💪'].map(e=>`<button class="emoji-btn" onclick="insertEmoji('${e}')">${e}</button>`).join('')}
function insertEmoji(e){const inp=document.getElementById('wall-input');inp.value+=e;inp.focus()}

function postWall(){
  const inp=document.getElementById('wall-input');
  const text=inp.value.trim();
  if(!text)return;
  wallPosts.unshift({id:Date.now(),userId:getMyId(),text,emoji:getEmoji(),color:getColor(getMyId()),likes:0,likedBy:[],time:Date.now()});
  try{localStorage.setItem('wallPosts',JSON.stringify(wallPosts))}catch(e){}
  renderWall();
  inp.value='';
  if(GITHUB_TOKEN)cloudSave('wallPosts',wallPosts).catch(()=>{});
}

function likeWall(id){
  const post=wallPosts.find(p=>p.id===id);
  if(!post)return;
  const mid=getMyId();
  if(post.likedBy.includes(mid)){post.likedBy=post.likedBy.filter(i=>i!==mid);post.likes--}
  else{post.likedBy.push(mid);post.likes++}
  try{localStorage.setItem('wallPosts',JSON.stringify(wallPosts))}catch(e){}
  renderWall();
  if(GITHUB_TOKEN)cloudSave('wallPosts',wallPosts).catch(()=>{});
}

function renderWall(){
  const list=document.getElementById('wall-list');
  const mid=getMyId();
  if(!wallPosts.length){list.innerHTML='<div class="wall-empty">💬 还没有吐槽，来第一条吧！</div>'}
  else{
    list.innerHTML=wallPosts.slice(0,30).map(p=>{
      const isMe=p.userId===mid;
      const isLiked=p.likedBy.includes(mid);
      return`<div class="wall-post"><div class="wall-header"><div class="wall-user"><div class="wall-avatar" style="background:${p.color}">${p.emoji}</div><span class="wall-name">${p.userId}${isMe?' (我)':''}</span></div><span class="wall-time">${timeAgo(p.time)}</span></div><div class="wall-content">${p.text}</div><div class="wall-actions"><button class="wall-action ${isLiked?'liked':''}" onclick="likeWall(${p.id})">${isLiked?'❤️':'🤍'} ${p.likes}</button></div></div>`;
    }).join('');
  }
  document.getElementById('wall-total').textContent=wallPosts.length;
  document.getElementById('wall-likes').textContent=wallPosts.reduce((s,p)=>s+p.likes,0);
}

// ===== Init =====
updateClock();setInterval(updateClock,1000);
updateCountdown();setInterval(updateCountdown,1000);
fetchWeather();setInterval(fetchWeather,600000);
renderMatches();renderTodo();
getMyId();renderEmojiBar();renderWall();

// Load cloud data
setTimeout(()=>loadCloudData(),1500);

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').then(r=>r.update()).catch(()=>{})}
